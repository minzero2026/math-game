    <style>
        /* 화면 기본 디자인 (배경색, 폰트 등) */
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f4f8fe;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;

        /* 메뉴판 하얀색 박스 디자인 */
        .menu-board {
            background-color: white;
            padding: 30px;

        }
        .menu-board h1 {
            color: #1a73e8;

        }
        .menu-board p {
            color: #5f6368;
            margin-bottom: 25px;
        }
        /* 버튼 디자인 */
        .game-btn {
            display: block;
            background-color: #e8f0fe;
            color: #1a73e8;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        /* 버튼에 마우스 올렸을 때 색상 변화 */
        .game-btn:hover {
            background-color: #1a73e8;
            color: white;
            box-shadow: 0 4px 6px rgba(26, 115, 232, 0.3);
        }
    </style>
