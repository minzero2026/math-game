<body class="bg-slate-100 text-slate-800 absolute inset-0 w-full h-full flex overflow-hidden">

  <!-- Left Sidebar (Problem Manager) -->
  <aside id="sidebar" class="w-24 bg-white border-r border-slate-200 flex flex-col z-50 transition-all duration-300 flex-shrink-0 shadow-lg">
    <!-- Header -->
    <div class="p-2 border-b border-slate-100 flex flex-col items-center justify-center bg-indigo-50/50 gap-1 pb-3">
      <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white shadow-sm text-sm mt-2">
        <i class="fa-solid fa-compass"></i>
      </div>
      <span class="font-bold text-[10px] text-indigo-950 text-center leading-tight">작도<br>학습지</span>
    </div>

    <!-- Problem List -->
    <div class="flex-1 overflow-y-auto p-1.5 space-y-1.5" id="problemListContainer"><div class="flex flex-col items-center justify-center p-2 rounded-xl transition-all bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 cursor-pointer">
          <div class="flex flex-col items-center gap-1 problem-selector w-full" data-index="0">
            <div class="w-5 flex justify-center text-[10px]"><i class="fa-regular fa-image text-emerald-400"></i></div>
            <span class="font-bold text-[10px] select-none text-center">문제 1</span>
          </div>
          
            <button class="w-6 h-6 rounded flex items-center justify-center hover:bg-black/10 transition-colors upload-trigger mt-1" data-index="0" title="배경 이미지 설정">
              <i class="fa-solid fa-image text-[10px]"></i>
            </button>
          
        </div><div class="flex flex-col items-center justify-center p-2 rounded-xl transition-all bg-indigo-600 text-white shadow-md shadow-indigo-200">
          <div class="flex flex-col items-center gap-1 problem-selector w-full" data-index="1">
            <div class="w-5 flex justify-center text-[10px]"><i class="fa-regular fa-image text-emerald-400"></i></div>
            <span class="font-bold text-[10px] select-none text-center">문제 2</span>
          </div>
          
            <button class="w-6 h-6 rounded flex items-center justify-center hover:bg-black/10 transition-colors upload-trigger mt-1" data-index="1" title="배경 이미지 설정">
              <i class="fa-solid fa-image text-[10px]"></i>
            </button>
          
        </div></div>

    <!-- Teacher Controls -->
    <div id="teacherControls" class="p-1.5 border-t border-slate-100 bg-slate-50 flex flex-col gap-1.5 pb-3">
      
      <!-- 배경 문제 이미지 크기 조절 슬라이더 -->
      <div class="px-1 py-1.5 bg-white rounded border border-slate-200 shadow-sm flex flex-col gap-1 transition-opacity" id="bgScaleContainer">
        <div class="flex justify-between items-center">
          <span class="text-[9px] font-bold text-slate-600">문제 크기</span>
          <span id="bgScaleVal" class="text-[9px] font-bold text-indigo-600">90%</span>
        </div>
        <input type="range" id="bgScaleInput" min="0.1" max="4.0" step="0.05" value="1.0" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
      </div>

      <button id="btnAddProblem" class="w-full py-2.5 rounded-lg border-2 border-dashed border-slate-300 text-slate-500 font-bold text-[10px] hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all flex flex-col items-center justify-center gap-1 mt-1">
        <i class="fa-solid fa-plus text-xs"></i>
        <span>문제추가</span>

  <script>
    // --- State Initialization (GitHub Static Support) ---
    let isStudentMode = false;
    let appState = {
      problems: [
        {
          id: 'prob_' + Date.now(),
          title: '문제 1',
          bgImage: null,
          bgWidth: 0, bgHeight: 0, bgX: 0, bgY: 0,
          bgScale: 1.0, 
          originalImgWidth: 0,
          originalImgHeight: 0,
          detectedPoints: [],
          drawings: []
        }
      ],
      currentIndex: 0
    };

    // --- Check if this HTML was exported for students ---
    if (typeof window.__INITIAL_STATE__ !== 'undefined') {
      isStudentMode = true;
      appState = window.__INITIAL_STATE__;
    }

    // --- Core Canvas Engine ---
    const canvas = document.getElementById('geometryCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvasWrapper');

    const btnZoomIn = document.getElementById('btnZoomIn');
    const btnZoomOut = document.getElementById('btnZoomOut');
    const btnHome = document.getElementById('btnHome');
    const bgScaleInput = document.getElementById('bgScaleInput');
    const bgScaleVal = document.getElementById('bgScaleVal');
    const compassSizeInput = document.getElementById('compassSizeInput');

    let drawings = []; 
    let undoHistory = [];
    
    let activeTool = 'select'; // select, point, pen, line, eraser
    let currentColor = '#2563eb'; 
    let currentLineWidth = 2.5;

    let panOffset = { x: 0, y: 0 };
    let zoomScale = 1.0;
    let panStart = { x: 0, y: 0 };

    let compass = { needle: { x: 400, y: 300 }, pencil: { x: 500, y: 300 }, active: true, scale: 1.0, legLength: 220, lockedRadius: 100, lockedAngle: 0 };

    const SNAP_DIST = 20; 
    let lastSnapPoint = null;
    let hoveredPart = null;
    let activeUploadProblemIndex = -1;

    let isDragging = false; 
    let dragTarget = null; 
    let dragOffset = { x: 0, y: 0, px: 0, py: 0 };
    let compassPrevAngle = 0; 
    let activeFreeLine = null; 
    let activeLineDraw = null;
    let currentMousePos = null;
    let hasErasedInCurrentStroke = false;
    let currentStrokeId = null;

    function showLoading(text) {
      document.getElementById('loadingText').innerText = text || "로딩 중...";
      document.getElementById('loadingOverlay').classList.remove('opacity-0', 'pointer-events-none');
    }
    
    function hideLoading() {
      document.getElementById('loadingOverlay').classList.add('opacity-0', 'pointer-events-none');
    }

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      const icon = toast.querySelector('i');
      
      toastMsg.innerText = msg;
      if (isError) {
        toast.className = "fixed top-20 left-1/2 -translate-x-1/2 bg-rose-600 text-white px-5 py-2.5 rounded-full shadow-xl flex items-center gap-2.5 transition-all duration-300 translate-y-0 opacity-100 z-[9999999]";
        icon.className = "fa-solid fa-triangle-exclamation text-white text-sm";
      } else {
        toast.className = "fixed top-20 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-2.5 rounded-full shadow-xl flex items-center gap-2.5 transition-all duration-300 translate-y-0 opacity-100 z-[9999999]";
        icon.className = "fa-solid fa-circle-check text-emerald-400 text-sm";
      }
      
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-32', 'opacity-0');
      }, 3000);
    }

    function renderSidebar() {
      const container = document.getElementById('problemListContainer');
      container.innerHTML = '';

      appState.problems.forEach((prob, index) => {
        const isActive = index === appState.currentIndex;
        const item = document.createElement('div');
        
        let activeClass = isActive 
          ? 'bg-indigo-600 text-white shadow-md shadow-indigo-200' 
          : 'bg-white text-slate-600 border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 cursor-pointer';

        let statusIcon = prob.bgImage ? '<i class="fa-regular fa-image text-emerald-400"></i>' : '<i class="fa-regular fa-file opacity-40"></i>';

        let uploadBtn = '';
        if(!isStudentMode) {
          uploadBtn = `
            <button class="w-6 h-6 rounded flex items-center justify-center hover:bg-black/10 transition-colors upload-trigger mt-1" data-index="${index}" title="배경 이미지 설정">
              <i class="fa-solid fa-image text-[10px]"></i>
            </button>
          `;
        }

        item.className = `flex flex-col items-center justify-center p-2 rounded-xl transition-all ${activeClass}`;
        item.innerHTML = `
          <div class="flex flex-col items-center gap-1 problem-selector w-full" data-index="${index}">
            <div class="w-5 flex justify-center text-[10px]">${statusIcon}</div>
            <span class="font-bold text-[10px] select-none text-center">${prob.title}</span>
          </div>
          ${uploadBtn}
        `;
        container.appendChild(item);
      });

      document.querySelectorAll('.problem-selector').forEach(el => {
        el.addEventListener('click', (e) => {
          const idx = parseInt(e.currentTarget.getAttribute('data-index'));
          loadProblem(idx);
        });
      });

      document.querySelectorAll('.upload-trigger').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(e.currentTarget.getAttribute('data-index'));
          activeUploadProblemIndex = idx;
          document.getElementById('imageLoader').click();
        });
      });
    }

    document.getElementById('btnAddProblem').addEventListener('click', () => {
      const newIndex = appState.problems.length;
      appState.problems.push({
        id: 'prob_' + Date.now(),
        title: `문제 ${newIndex + 1}`,
        bgImage: null,
        bgWidth: 0, bgHeight: 0, bgX: 0, bgY: 0,
        bgScale: 1.0,
        originalImgWidth: 0,
        originalImgHeight: 0,
        detectedPoints: [],
        drawings: []
      });
      renderSidebar();
      loadProblem(newIndex);
    });

    // 🌟 선생님을 위한 "깃허브용 HTML 패키징 다운로드" 로직
    document.getElementById('btnExportHtml').addEventListener('click', () => {
      showLoading("학생 배포용 HTML 파일을 생성 중입니다...");
      saveCurrentDrawingsToState();

      // 상태 복사 및 선생님이 작성한 모든 펜 흔적 초기화 (학생용 백지 상태)
      const exportState = JSON.parse(JSON.stringify(appState));
      exportState.problems.forEach(p => p.drawings = []); 

      // 현재 문서의 HTML 추출
      let htmlContent = "<!DOCTYPE html>\n<html lang=\"ko\">\n" + document.documentElement.innerHTML + "\n</html>";

      // 렌더링을 위해 학생 모드 진입점과 상태 객체를 스크립트에 주입
      const stateScript = `<script id="injected-state">window.__INITIAL_STATE__ = ${JSON.stringify(exportState)};<\/script>`;
      
      if (htmlContent.includes('<script id="injected-state">')) {
        htmlContent = htmlContent.replace(/<script id="injected-state">.*?<\/script>/, stateScript);
      } else {
        htmlContent = htmlContent.replace('</head>', stateScript + '\n</head>');
      }

      // Blob 파일로 생성 후 강제 다운로드
      const blob = new Blob([htmlContent], {type: "text/html;charset=utf-8"});
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "index.html";
      link.click();

      hideLoading();
      showToast("index.html이 다운로드되었습니다. 이 파일을 깃허브에 업로드하세요!");
    });

    function detectPointsFromCanvas(ctx, width, height) {
      const imgData = ctx.getImageData(0, 0, width, height);
      const data = imgData.data;
      const visited = new Uint8Array(width * height);
      const blobs = [];
      const threshold = 160; 

      const getIdx = (x, y) => (y * width + x) * 4;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          let vIdx = y * width + x;
          if (visited[vIdx]) continue;

          let pIdx = getIdx(x, y);
          let brightness = (data[pIdx] + data[pIdx+1] + data[pIdx+2]) / 3;
          
          if (brightness < threshold && data[pIdx+3] > 50) { 
            let queueX = [x];
            let queueY = [y];
            visited[vIdx] = 1;
            let blob = {
              minX: x, maxX: x, minY: y, maxY: y,
              pixels: 0, sumX: 0, sumY: 0
            };

            let head = 0;
            while(head < queueX.length) {
              let currX = queueX[head];
              let currY = queueY[head];
              head++;
              
              blob.pixels++;
              blob.sumX += currX;
              blob.sumY += currY;
              if (currX < blob.minX) blob.minX = currX;
              if (currX > blob.maxX) blob.maxX = currX;
              if (currY < blob.minY) blob.minY = currY;
              if (currY > blob.maxY) blob.maxY = currY;

              const neighbors = [
                {x: currX+1, y: currY}, {x: currX-1, y: currY},
                {x: currX, y: currY+1}, {x: currX, y: currY-1}
              ];
              for(let i=0; i<4; i++) {
                let nx = neighbors[i].x; let ny = neighbors[i].y;
                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                  let nvIdx = ny * width + nx;
                  if (!visited[nvIdx]) {
                    visited[nvIdx] = 1;
                    let npIdx = getIdx(nx, ny);
                    let nBright = (data[npIdx] + data[npIdx+1] + data[npIdx+2]) / 3;
                    if (nBright < threshold && data[npIdx+3] > 50) {
                      queueX.push(nx);
                      queueY.push(ny);
                    }
                  }
                }
              }
            }

            let bw = blob.maxX - blob.minX + 1;
            let bh = blob.maxY - blob.minY + 1;
            if (bw >= 3 && bw <= 40 && bh >= 3 && bh <= 40) {
              let ratio = bw / bh;
              if (ratio >= 0.6 && ratio <= 1.6) {
                let solidity = blob.pixels / (bw * bh);
                if (solidity > 0.45) { 
                  blobs.push({
                    x: blob.sumX / blob.pixels, 
                    y: blob.sumY / blob.pixels  
                  });
                }
              }
            }
          } else {
            visited[vIdx] = 1;
          }
        }
      }
      return blobs;
    }

    document.getElementById('imageLoader').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file || activeUploadProblemIndex === -1) return;

      showLoading("학습지 최적화 중...");

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const MAX_WIDTH = 1200; const MAX_HEIGHT = 900;
          let w = img.width; let h = img.height;
          
          if (w > MAX_WIDTH || h > MAX_HEIGHT) {
            const ratio = Math.min(MAX_WIDTH / w, MAX_HEIGHT / h);
            w *= ratio; h *= ratio;
          }

          const tmpCanvas = document.createElement('canvas');
          tmpCanvas.width = w; tmpCanvas.height = h;
          const tmpCtx = tmpCanvas.getContext('2d');
          
          tmpCtx.fillStyle = '#ffffff';
          tmpCtx.fillRect(0, 0, w, h);
          tmpCtx.drawImage(img, 0, 0, w, h);
          
          const detectedPoints = detectPointsFromCanvas(tmpCtx, w, h);

          const dataUrl = tmpCanvas.toDataURL('image/jpeg', 0.6);
          const targetProb = appState.problems[activeUploadProblemIndex];
          targetProb.bgImage = dataUrl; 
          targetProb.bgScale = 1.0; 
          targetProb.originalImgWidth = w;
          targetProb.originalImgHeight = h;
          targetProb.detectedPoints = detectedPoints;
          targetProb.drawings = [];
          
          if(activeUploadProblemIndex === appState.currentIndex) {
            loadProblem(activeUploadProblemIndex);
          } else {
            renderSidebar();
          }

          e.target.value = ''; 
          activeUploadProblemIndex = -1;
          hideLoading();
          
          if(detectedPoints.length > 0) {
            showToast(`이미지 내에서 ${detectedPoints.length}개의 기준점을 찾아냈습니다!`);
          } else {
            showToast("문제가 정상 등록되었습니다.");
          }
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    bgScaleInput.addEventListener('input', (e) => {
      const currentProb = appState.problems[appState.currentIndex];
      if (currentProb && currentProb.bgImage) {
        currentProb.bgScale = parseFloat(e.target.value);
        bgScaleVal.innerText = Math.round(currentProb.bgScale * 100) + '%';
        draw();
      }
    });

    compassSizeInput.addEventListener('input', (e) => {
      let newScale = parseFloat(e.target.value);
      let ratio = newScale / compass.scale;
      
      compass.scale = newScale;
      compass.legLength *= ratio;
      compass.lockedRadius *= ratio;
      
      const curAngle = Math.atan2(compass.pencil.y - compass.needle.y, compass.pencil.x - compass.needle.x);
      compass.pencil.x = compass.needle.x + compass.lockedRadius * Math.cos(curAngle);
      compass.pencil.y = compass.needle.y + compass.lockedRadius * Math.sin(curAngle);
      
      draw();
    });

    function saveCurrentDrawingsToState() {
      if (appState.problems[appState.currentIndex]) {
        appState.problems[appState.currentIndex].drawings = JSON.parse(JSON.stringify(drawings));
      }
    }

    let loadedBgImageElement = null;

    function loadProblem(index) {
      if (index < 0 || index >= appState.problems.length) return;
      saveCurrentDrawingsToState();
      
      appState.currentIndex = index;
      const prob = appState.problems[index];
      
      drawings = JSON.parse(JSON.stringify(prob.drawings || []));
      undoHistory = [];
      panOffset = { x: 0, y: 0 };
      zoomScale = 1.0;

      bgScaleInput.value = prob.bgScale || 1.0;
      bgScaleVal.innerText = Math.round((prob.bgScale || 1.0) * 100) + '%';
      if (!prob.bgImage) {
        bgScaleInput.disabled = true;
        document.getElementById('bgScaleContainer').classList.add('opacity-40');
      } else {
        bgScaleInput.disabled = false;
        document.getElementById('bgScaleContainer').classList.remove('opacity-40');
      }

      if (prob.bgImage) {
        const img = new Image();
        img.onload = () => {
          loadedBgImageElement = img;
          const screenW = canvas.width / (window.devicePixelRatio || 1);
          const screenH = canvas.height / (window.devicePixelRatio || 1);
          const imgRatio = img.width / img.height;
          const screenRatio = screenW / screenH;

          if (imgRatio > screenRatio) {
              prob.bgWidth = screenW - 20; 
              prob.bgHeight = (screenW - 20) / imgRatio;
          } else {
              prob.bgHeight = screenH - 20;
              prob.bgWidth = (screenH - 20) * imgRatio;
          }
          
          prob.bgX = (screenW - prob.bgWidth) / 2;
          prob.bgY = (screenH - prob.bgHeight) / 2;
          
          renderSidebar();
          draw();
        };
        img.src = prob.bgImage;
      } else {
        loadedBgImageElement = null;
        renderSidebar();
        draw();
      }
    }

    function setActiveTool(tool) {
      activeTool = tool;
      document.querySelectorAll('.tool-btn').forEach(b => {
        b.classList.remove('text-indigo-600', 'bg-white', 'shadow-sm', 'active-tool');
        b.classList.add('text-slate-500');
      });
      
      let btn;
      if(tool === 'select') btn = document.getElementById('toolSelect');
      if(tool === 'point') btn = document.getElementById('toolPoint');
      if(tool === 'pen') btn = document.getElementById('toolPen');
      if(tool === 'line') btn = document.getElementById('toolLine');
      if(tool === 'eraser') btn = document.getElementById('toolEraser');
      
      if(btn) {
        btn.classList.remove('text-slate-500');
        btn.classList.add('text-indigo-600', 'bg-white', 'shadow-sm', 'active-tool');
      }

      const lineWidthContainer = document.getElementById('lineWidthContainer');
      if (tool === 'eraser') {
        if(lineWidthContainer) {
          lineWidthContainer.style.opacity = '0.3';
          lineWidthContainer.style.pointerEvents = 'none';
        }
      } else {
        if(lineWidthContainer) {
          lineWidthContainer.style.opacity = '1';
          lineWidthContainer.style.pointerEvents = 'auto';
        }
      }
      
      draw();
    }

    document.getElementById('toolSelect').addEventListener('click', () => setActiveTool('select'));
    document.getElementById('toolPoint').addEventListener('click', () => setActiveTool('point'));
    document.getElementById('toolPen').addEventListener('click', () => setActiveTool('pen'));
    document.getElementById('toolLine').addEventListener('click', () => setActiveTool('line'));
    document.getElementById('toolEraser').addEventListener('click', () => setActiveTool('eraser'));

    function screenToWorkspace(pos) {
      return { x: (pos.x - panOffset.x) / zoomScale, y: (pos.y - panOffset.y) / zoomScale };
    }

    function workspaceToScreen(pos) {
      return { x: pos.x * zoomScale + panOffset.x, y: pos.y * zoomScale + panOffset.y };
    }

    function drawRoundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
      ctx.arcTo(x + width, y, x + width, y + radius, radius); ctx.lineTo(x + width, y + height - radius);
      ctx.arcTo(x + width, y + height, x + width - radius, y + height, radius); ctx.lineTo(x + radius, y + height);
      ctx.arcTo(x, y + height, x, y + height - radius, radius); ctx.lineTo(x, y + radius);
      ctx.arcTo(x, y, x + radius, y, radius); ctx.closePath();
    }

    function resizeCanvas() {
      const rect = wrapper.getBoundingClientRect();
      const dpi = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpi;
      canvas.height = rect.height * dpi;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.scale(dpi, dpi);
      
      const currentProb = appState.problems[appState.currentIndex];
      if (currentProb && currentProb.bgImage) {
         loadProblem(appState.currentIndex); 
      } else {
         draw();
      }
    }

    window.addEventListener('resize', resizeCanvas);

    function getHingePoint(n, p) {
      const mx = (n.x + p.x) / 2; const my = (n.y + p.y) / 2;
      const dx = p.x - n.x; const dy = p.y - n.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist === 0) return { x: n.x, y: n.y - compass.legLength };
      const ux = dx / dist; const uy = dy / dist;
      const vx = -uy; const vy = ux;
      const halfDist = dist / 2;
      const h_dist = Math.sqrt(Math.max(0, compass.legLength * compass.legLength - halfDist * halfDist));
      return { x: mx - vx * h_dist, y: my - vy * h_dist };
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(panOffset.x, panOffset.y);
      ctx.scale(zoomScale, zoomScale);

      const currentProb = appState.problems[appState.currentIndex];

      if (currentProb) {
        if (loadedBgImageElement) {
          const scale = currentProb.bgScale || 1.0;
          const scaledW = currentProb.bgWidth * scale;
          const scaledH = currentProb.bgHeight * scale;
          const offsetX = currentProb.bgX + (currentProb.bgWidth - scaledW) / 2;
          const offsetY = currentProb.bgY + (currentProb.bgHeight - scaledH) / 2;
          
          ctx.drawImage(loadedBgImageElement, offsetX, offsetY, scaledW, scaledH);
        } else {
          ctx.fillStyle = '#cbd5e1'; ctx.font = 'bold 18px Noto Sans KR, sans-serif'; ctx.textAlign = 'center';
          ctx.fillText("좌측에서 문제를 추가해주세요.", canvas.width/2 / zoomScale, canvas.height/2 / zoomScale);
          ctx.textAlign = 'left';
        }
      }

      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      drawings.forEach((shape) => {
        ctx.strokeStyle = shape.color; ctx.lineWidth = shape.width;
        if (shape.type === 'line') {
          ctx.beginPath(); ctx.moveTo(shape.x1, shape.y1); ctx.lineTo(shape.x2, shape.y2); ctx.stroke();
        } else if (shape.type === 'arc') {
          ctx.beginPath(); ctx.arc(shape.cx, shape.cy, shape.r, shape.startAngle, shape.endAngle, shape.startAngle > shape.endAngle); ctx.stroke();
        } else if (shape.type === 'free') {
          if (shape.points.length < 2) return;
          ctx.beginPath(); ctx.moveTo(shape.points[0].x, shape.points[0].y);
          for (let i = 1; i < shape.points.length; i++) ctx.lineTo(shape.points[i].x, shape.points[i].y);
          ctx.stroke();
        } else if (shape.type === 'point') {
          ctx.fillStyle = shape.color;
          ctx.beginPath(); 
          ctx.arc(shape.x, shape.y, shape.width + 2, 0, Math.PI * 2); 
          ctx.fill();
        }
      });

      if (lastSnapPoint) {
        ctx.strokeStyle = 'rgba(16, 185, 129, 0.8)'; ctx.lineWidth = 1.5 / zoomScale; 
        ctx.beginPath(); ctx.arc(lastSnapPoint.x, lastSnapPoint.y, 7 / zoomScale, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#10b981'; ctx.beginPath(); ctx.arc(lastSnapPoint.x, lastSnapPoint.y, 3 / zoomScale, 0, Math.PI * 2); ctx.fill();
      }

      if (compass.active) drawCompass();

      if (activeTool === 'eraser' && currentMousePos) {
        ctx.beginPath();
        ctx.arc(currentMousePos.x, currentMousePos.y, 25 / zoomScale, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.fill();
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 1.5 / zoomScale;
        ctx.stroke();
      }

      ctx.restore(); 
    }

    function getDistance(p1, p2) { return Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2); }

    function getSnapPoints() {
      let points = [];
      const currentProb = appState.problems[appState.currentIndex];
      
      drawings.forEach(d => {
        if (d.type === 'line') { points.push({ x: d.x1, y: d.y1 }); points.push({ x: d.x2, y: d.y2 }); }
        else if (d.type === 'point') { points.push({ x: d.x, y: d.y }); }
      });

      for (let i = 0; i < drawings.length; i++) {
        for (let j = i + 1; j < drawings.length; j++) {
          let d1 = drawings[i], d2 = drawings[j];
          if (d1.type === 'line' && d2.type === 'line') {
            let ipt = findLineLineIntersection(d1, d2); if (ipt) points.push(ipt);
          } else if (d1.type === 'arc' && d2.type === 'line') {
            findArcLineIntersections(d1, d2).forEach(pt => points.push(pt));
          } else if (d1.type === 'line' && d2.type === 'arc') {
            findArcLineIntersections(d2, d1).forEach(pt => points.push(pt));
          } else if (d1.type === 'arc' && d2.type === 'arc') {
            findArcArcIntersections(d1, d2).forEach(pt => points.push(pt));
          }
        }
      }
      
      if (currentProb && currentProb.detectedPoints && loadedBgImageElement) {
        const scale = currentProb.bgScale || 1.0;
        const scaledW = currentProb.bgWidth * scale;
        const scaledH = currentProb.bgHeight * scale;
        const offsetX = currentProb.bgX + (currentProb.bgWidth - scaledW) / 2;
        const offsetY = currentProb.bgY + (currentProb.bgHeight - scaledH) / 2;
        
        currentProb.detectedPoints.forEach(pt => {
          points.push({
            x: offsetX + (pt.x / currentProb.originalImgWidth) * scaledW,
            y: offsetY + (pt.y / currentProb.originalImgHeight) * scaledH
          });
        });
      }

      return points;
    }

    function findLineLineIntersection(l1, l2) {
      let d = (l1.x1 - l1.x2) * (l2.y1 - l2.y2) - (l1.y1 - l1.y2) * (l2.x1 - l2.x2);
      if (Math.abs(d) < 0.01) return null;
      let t = ((l1.x1 - l2.x1) * (l2.y1 - l2.y2) - (l1.y1 - l2.y1) * (l2.x1 - l2.x2)) / d;
      let u = ((l1.x1 - l1.x2) * (l1.y1 - l2.y1) - (l1.y1 - l1.y2) * (l1.x1 - l2.x1)) / d;
      if (t >= 0 && t <= 1 && u >= 0 && u <= 1) return { x: l1.x1 + t * (l1.x2 - l1.x1), y: l1.y1 + t * (l1.y2 - l1.y1) };
      return null;
    }

    function findArcLineIntersections(arc, line) {
      let results = [];
      let dx = line.x2 - line.x1; let dy = line.y2 - line.y1; let len = Math.sqrt(dx*dx + dy*dy);
      if (len < 0.1) return results;
      let ux = dx / len; let uy = dy / len;
      let cx = arc.cx; let cy = arc.cy; let r = arc.r;
      let t = (cx - line.x1) * ux + (cy - line.y1) * uy;
      let px = line.x1 + t * ux; let py = line.y1 + t * uy;
      let dist = getDistance({ x: cx, y: cy }, { x: px, y: py });
      if (dist > r) return results;
      let halfChord = Math.sqrt(r*r - dist*dist); let t1 = t - halfChord; let t2 = t + halfChord;
      [t1, t2].forEach(tt => {
        if (tt >= 0 && tt <= len) {
          let ix = line.x1 + tt * ux; let iy = line.y1 + tt * uy;
          let angle = Math.atan2(iy - cy, ix - cx);
          if (isAngleInsideArc(angle, arc)) results.push({ x: ix, y: iy });
        }
      });
      return results;
    }

    function isAngleInsideArc(angle, arc) {
      let normA = (angle + Math.PI * 2) % (Math.PI * 2);
      let normS = (arc.startAngle + Math.PI * 2) % (Math.PI * 2);
      let normE = (arc.endAngle + Math.PI * 2) % (Math.PI * 2);
      if (normS <= normE) return normA >= normS && normA <= normE;
      else return normA >= normS || normA <= normE;
    }

    function findArcArcIntersections(a1, a2) {
      let results = []; let d = getDistance({ x: a1.cx, y: a1.cy }, { x: a2.cx, y: a2.cy });
      if (d > a1.r + a2.r || d < Math.abs(a1.r - a2.r) || d < 0.1) return results;
      let a = (a1.r * a1.r - a2.r * a2.r + d * d) / (2 * d); let h = Math.sqrt(a1.r * a1.r - a * a);
      let x2 = a1.cx + a * (a2.cx - a1.cx) / d; let y2 = a1.cy + a * (a2.cy - a1.cy) / d;
      let ix1 = x2 + h * (a2.cy - a1.cy) / d; let iy1 = y2 - h * (a2.cx - a1.cx) / d;
      let ix2 = x2 - h * (a2.cy - a1.cy) / d; let iy2 = y2 + h * (a2.cx - a1.cx) / d;
      [ {x: ix1, y: iy1}, {x: ix2, y: iy2} ].forEach(pt => {
        let ang1 = Math.atan2(pt.y - a1.cy, pt.x - a1.cx); let ang2 = Math.atan2(pt.y - a2.cy, pt.x - a2.cx);
        if (isAngleInsideArc(ang1, a1) && isAngleInsideArc(ang2, a2)) results.push(pt);
      });
      return results;
    }

    function snapToNearPoint(point) {
      let snaps = getSnapPoints(); lastSnapPoint = null;
      const responsiveSnapDist = SNAP_DIST / zoomScale; 
      for (let i = 0; i < snaps.length; i++) {
        if (getDistance(point, snaps[i]) < responsiveSnapDist) {
          lastSnapPoint = snaps[i]; return snaps[i];
        }
      }
      return point;
    }

    function getProjectedPointOnSegment(p, a, b) {
      let dx = b.x - a.x; let dy = b.y - a.y; let l2 = dx * dx + dy * dy;
      if (l2 === 0) return { x: a.x, y: a.y, t: 0 };
      let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / l2; t = Math.max(0, Math.min(1, t)); 
      return { x: a.x + t * dx, y: a.y + t * dy, t: t };
    }

    function drawCompass() {
      const cx = compass.needle.x; const cy = compass.needle.y;
      const px = compass.pencil.x; const py = compass.pencil.y;
      const h = getHingePoint(compass.needle, compass.pencil);
      const sc = compass.scale || 1.0;

      ctx.save(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';

      const angleL = Math.atan2(cy - h.y, cx - h.x); const distL = Math.hypot(cx - h.x, cy - h.y);
      const angleR = Math.atan2(py - h.y, px - h.x); const distR = Math.hypot(px - h.x, py - h.y);

      ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(angleL);
      ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 12 * sc; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(distL - 15 * sc, 0); ctx.stroke();
      ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 4 * sc; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(distL - 15 * sc, 0); ctx.stroke();
      ctx.fillStyle = '#383040'; ctx.beginPath(); ctx.moveTo(distL - 15 * sc, -4 * sc); ctx.lineTo(distL - 15 * sc, 4 * sc); ctx.lineTo(distL, 0); ctx.closePath(); ctx.fill();
      ctx.restore();

      ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(angleR);
      ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 12 * sc; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(distR - 45 * sc, 0); ctx.stroke();
      ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 4 * sc; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(distR - 45 * sc, 0); ctx.stroke();
      ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); drawRoundRect(ctx, distR - 55 * sc, -11 * sc, 22 * sc, 22 * sc, 4 * sc); ctx.fill();
      ctx.fillStyle = '#383040'; ctx.beginPath(); ctx.arc(distR - 44 * sc, 0, 5 * sc, 0, Math.PI * 2); ctx.fill();

      ctx.translate(distR, 0);
      ctx.fillStyle = '#be124c'; ctx.beginPath(); ctx.rect(-108 * sc, -7 * sc, 90 * sc, 14 * sc); ctx.fill();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; ctx.beginPath(); ctx.rect(-108 * sc, 0, 90 * sc, 7 * sc); ctx.fill();
      
      ctx.fillStyle = '#fef3c7'; ctx.beginPath(); ctx.moveTo(-18 * sc, -7 * sc); ctx.lineTo(-18 * sc, 7 * sc); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
      ctx.fillStyle = currentColor; ctx.beginPath(); ctx.moveTo(-5 * sc, -2.5 * sc); ctx.lineTo(-5 * sc, 2.5 * sc); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
      ctx.restore();

      ctx.fillStyle = '#383040'; ctx.beginPath(); ctx.arc(h.x, h.y, 11 * sc, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#383040'; ctx.lineWidth = 7 * sc; ctx.beginPath(); ctx.moveTo(h.x, h.y); ctx.lineTo(h.x, h.y - 24 * sc); ctx.stroke();
      ctx.fillStyle = '#383040'; drawRoundRect(ctx, h.x - 5 * sc, h.y - 29 * sc, 10 * sc, 6 * sc, 2 * sc); ctx.fill();
      ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.arc(h.x, h.y, 4 * sc, 0, Math.PI * 2); ctx.fill();
      ctx.restore(); 
    }

    function getDistanceToSegment(p, a, b) {
      let l2 = getDistance(a, b) ** 2;
      if (l2 === 0) return getDistance(p, a);
      let t = ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2; t = Math.max(0, Math.min(1, t));
      return getDistance(p, { x: a.x + t * (b.x - a.x), y: a.y + t * (b.y - a.y) });
    }

    function checkHover(pos) {
      if (activeTool === 'eraser') {
        canvas.style.cursor = 'none'; 
        hoveredPart = null; return null;
      }

      const h = getHingePoint(compass.needle, compass.pencil);
      const grabLimit = (val) => val / zoomScale; 
      const sc = compass.scale || 1.0;

      if (compass.active && getDistance(pos, compass.needle) < grabLimit(22 * sc)) { canvas.style.cursor = 'move'; hoveredPart = 'compass_needle'; return hoveredPart; }
      if (compass.active && getDistance(pos, compass.pencil) < grabLimit(18 * sc)) { canvas.style.cursor = 'crosshair'; hoveredPart = 'compass_pencil_tip'; return hoveredPart; }
      if (compass.active) {
        const dx = compass.pencil.x - h.x; const dy = compass.pencil.y - h.y; const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 0) {
          const bodyCenterX = compass.pencil.x - (dx/dist) * 65 * sc; 
          const bodyCenterY = compass.pencil.y - (dy/dist) * 65 * sc;
          if (getDistance(pos, { x: bodyCenterX, y: bodyCenterY }) < grabLimit(35 * sc)) { canvas.style.cursor = 'ew-resize'; hoveredPart = 'compass_pencil_body'; return hoveredPart; }
        }
      }
      if (compass.active && getDistance(pos, h) < grabLimit(32 * sc)) { canvas.style.cursor = 'grab'; hoveredPart = 'compass_hinge'; return hoveredPart; }
      if (compass.active) {
        if (getDistanceToSegment(pos, h, compass.needle) < grabLimit(16 * sc) || getDistanceToSegment(pos, h, compass.pencil) < grabLimit(16 * sc)) { canvas.style.cursor = 'move'; hoveredPart = 'compass_body'; return hoveredPart; }
      }
      
      if (activeTool === 'pen' || activeTool === 'line' || activeTool === 'point') canvas.style.cursor = 'crosshair';
      else canvas.style.cursor = 'grab'; 
      hoveredPart = null; return null;
    }

    function eraseAt(pos) {
      let modified = false; 
      const eraseRadius = 25 / zoomScale; 
      
      let hitStrokeIds = new Set(); 
      let hitIndices = new Set();   

      for (let i = drawings.length - 1; i >= 0; i--) {
        let shape = drawings[i]; let hit = false;
        
        if (shape.type === 'line') { 
          if (getDistanceToSegment(pos, { x: shape.x1, y: shape.y1 }, { x: shape.x2, y: shape.y2 }) < eraseRadius) hit = true; 
        }
        else if (shape.type === 'arc') {
          if (Math.abs(getDistance(pos, { x: shape.cx, y: shape.cy }) - shape.r) < eraseRadius) {
            if (isAngleInsideArc(Math.atan2(pos.y - shape.cy, pos.x - shape.cx), shape)) hit = true;
          }
        } 
        else if (shape.type === 'free') {
          for (let j = 0; j < shape.points.length - 1; j++) {
            if (getDistanceToSegment(pos, shape.points[j], shape.points[j+1]) < eraseRadius) { hit = true; break; }
          }
        } 
        else if (shape.type === 'point') {
          if (getDistance(pos, { x: shape.x, y: shape.y }) < eraseRadius) hit = true;
        }
        
        if (hit) {
          if (shape.strokeId) {
            hitStrokeIds.add(shape.strokeId); 
          } else {
            hitIndices.add(i);
          }
        }
      }

      if (hitStrokeIds.size > 0 || hitIndices.size > 0) {
        if (!hasErasedInCurrentStroke) { 
          saveState(); 
          hasErasedInCurrentStroke = true; 
        } 
        
        const initialLength = drawings.length;
        drawings = drawings.filter((shape, index) => {
          if (shape.strokeId && hitStrokeIds.has(shape.strokeId)) return false;
          if (hitIndices.has(index)) return false;
          return true;
        });

        if (drawings.length !== initialLength) modified = true;
      }

      if (modified) draw();
    }

    function handleStart(e) {
      if (e.target.closest('.glass-panel') || e.target.closest('#sidebar') || e.target.closest('#toast')) return;
      const screenPos = getMousePos(e); const pos = screenToWorkspace(screenPos); 
      currentMousePos = pos;
      const target = checkHover(pos);
      
      isDragging = true; dragTarget = target;
      
      currentStrokeId = 'stroke_' + Date.now() + '_' + Math.floor(Math.random() * 1000);

      if (activeTool === 'eraser') {
        hasErasedInCurrentStroke = false;
        eraseAt(pos);
        dragTarget = 'eraser_drag';
        draw();
        return;
      }

      if (!target && activeTool === 'select') { dragTarget = 'canvas_pan'; panStart.x = screenPos.x - panOffset.x; panStart.y = screenPos.y - panOffset.y; canvas.style.cursor = 'grabbing'; return; }

      if (target === 'compass_needle') { dragOffset.x = pos.x - compass.needle.x; dragOffset.y = pos.y - compass.needle.y; saveState(); }
      else if (target === 'compass_pencil_tip') { compass.lockedRadius = getDistance(compass.needle, compass.pencil); compassPrevAngle = Math.atan2(pos.y - compass.needle.y, pos.x - compass.needle.x); saveState(); }
      else if (target === 'compass_pencil_body') { saveState(); }
      else if (target === 'compass_hinge') { canvas.style.cursor = 'grabbing'; compassPrevAngle = Math.atan2(pos.y - compass.needle.y, pos.x - compass.needle.x); saveState(); }
      else if (target === 'compass_body') { dragOffset.x = pos.x - compass.needle.x; dragOffset.y = pos.y - compass.needle.y; saveState(); }
      else {
        if (activeTool === 'pen') { 
          saveState(); dragTarget = 'pen_draw'; activeFreeLine = { type: 'free', points: [pos], color: currentColor, width: currentLineWidth, strokeId: currentStrokeId }; drawings.push(activeFreeLine); 
        } else if (activeTool === 'line') {
          saveState(); dragTarget = 'straight_line_draw';
          let snappedPos = snapToNearPoint(pos);
          activeLineDraw = { type: 'line', x1: snappedPos.x, y1: snappedPos.y, x2: snappedPos.x, y2: snappedPos.y, color: currentColor, width: currentLineWidth, strokeId: currentStrokeId };
          drawings.push(activeLineDraw);
        } else if (activeTool === 'point') {
          saveState(); dragTarget = 'point_draw';
          let snappedPos = snapToNearPoint(pos);
          drawings.push({ type: 'point', x: snappedPos.x, y: snappedPos.y, color: currentColor, width: currentLineWidth, strokeId: currentStrokeId });
        }
      }
      draw();
    }

    function handleMove(e) {
      const screenPos = getMousePos(e); const pos = screenToWorkspace(screenPos);
      currentMousePos = pos;
      
      if (!isDragging) { 
        checkHover(pos); 
        draw(); 
        return; 
      }

      if (dragTarget === 'canvas_pan') { panOffset.x = screenPos.x - panStart.x; panOffset.y = screenPos.y - panStart.y; canvas.style.cursor = 'grabbing'; draw(); return; }
      
      if (dragTarget === 'eraser_drag') { 
        eraseAt(pos); 
        draw(); 
        return; 
      }

      if (dragTarget === 'compass_needle') { let snappedNeedle = snapToNearPoint({ x: pos.x - dragOffset.x, y: pos.y - dragOffset.y }); compass.needle.x = snappedNeedle.x; compass.needle.y = snappedNeedle.y; }
      else if (dragTarget === 'compass_pencil_tip') {
        let proposedPencil = snapToNearPoint(pos);
        
        let curAngle = Math.atan2(proposedPencil.y - compass.needle.y, proposedPencil.x - compass.needle.x);
        let diff = curAngle - compassPrevAngle;
        if (diff > Math.PI) {
          curAngle -= 2 * Math.PI;
        } else if (diff < -Math.PI) {
          curAngle += 2 * Math.PI;
        }

        if (lastSnapPoint) {
          const snapRadius = getDistance(compass.needle, lastSnapPoint); 
          drawings.push({ type: 'arc', cx: compass.needle.x, cy: compass.needle.y, r: snapRadius, startAngle: compassPrevAngle, endAngle: curAngle, color: currentColor, width: currentLineWidth, strokeId: currentStrokeId });
          compass.pencil.x = lastSnapPoint.x; compass.pencil.y = lastSnapPoint.y; 
          compassPrevAngle = curAngle;
        } else {
          drawings.push({ type: 'arc', cx: compass.needle.x, cy: compass.needle.y, r: compass.lockedRadius, startAngle: compassPrevAngle, endAngle: curAngle, color: currentColor, width: currentLineWidth, strokeId: currentStrokeId });
          compass.pencil.x = compass.needle.x + compass.lockedRadius * Math.cos(curAngle); compass.pencil.y = compass.needle.y + compass.lockedRadius * Math.sin(curAngle); 
          compassPrevAngle = curAngle;
        }
      } else if (dragTarget === 'compass_pencil_body') {
        let proposedPencil = snapToNearPoint(pos); const r = getDistance(compass.needle, proposedPencil);
        const sc = compass.scale || 1.0;
        compass.lockedRadius = Math.max(30 * sc, Math.min(r, compass.legLength * 2 - 10 * sc));
        const curAngle = Math.atan2(proposedPencil.y - compass.needle.y, proposedPencil.x - compass.needle.x);
        compass.pencil.x = compass.needle.x + compass.lockedRadius * Math.cos(curAngle); compass.pencil.y = compass.needle.y + compass.lockedRadius * Math.sin(curAngle);
      } else if (dragTarget === 'compass_hinge') {
        const curAngle = Math.atan2(pos.y - compass.needle.y, pos.x - compass.needle.x); const angleDiff = curAngle - compassPrevAngle;
        const currentPencilAngle = Math.atan2(compass.pencil.y - compass.needle.y, compass.pencil.x - compass.needle.x); const newPencilAngle = currentPencilAngle + angleDiff;
        const r = getDistance(compass.needle, compass.pencil);
        compass.pencil.x = compass.needle.x + r * Math.cos(newPencilAngle); compass.pencil.y = compass.needle.y + r * Math.sin(newPencilAngle); compassPrevAngle = curAngle;
      } else if (dragTarget === 'compass_body') {
        let snappedNeedle = snapToNearPoint({ x: pos.x - dragOffset.x, y: pos.y - dragOffset.y });
        const dx = snappedNeedle.x - compass.needle.x; const dy = snappedNeedle.y - compass.needle.y;
        compass.needle.x += dx; compass.needle.y += dy; compass.pencil.x += dx; compass.pencil.y += dy;
      } else if (dragTarget === 'straight_line_draw') {
        if (activeLineDraw) {
          let snappedPos = snapToNearPoint(pos);
          activeLineDraw.x2 = snappedPos.x;
          activeLineDraw.y2 = snappedPos.y;
        }
      } else if (dragTarget === 'pen_draw') {
        if (activeFreeLine) activeFreeLine.points.push(pos);
      }
      draw();
    }

    function handleEnd() {
      if (dragTarget === 'compass_hinge') canvas.style.cursor = 'grab';
      isDragging = false; dragTarget = null; activeFreeLine = null; activeLineDraw = null; lastSnapPoint = null; draw();
    }

    canvas.addEventListener('pointerdown', handleStart); 
    window.addEventListener('pointermove', handleMove); 
    window.addEventListener('pointerup', handleEnd);
    
    canvas.addEventListener('pointerleave', () => { currentMousePos = null; draw(); });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault(); const zoomFactor = 1.12; const screenPos = getMousePos(e); const workspacePosBefore = screenToWorkspace(screenPos);
      if (e.deltaY < 0) zoomScale = Math.min(zoomScale * zoomFactor, 5.0); else zoomScale = Math.max(zoomScale / zoomFactor, 0.4);
      panOffset.x = screenPos.x - workspacePosBefore.x * zoomScale; panOffset.y = screenPos.y - workspacePosBefore.y * zoomScale;
      draw();
    }, { passive: false });

    btnZoomIn.addEventListener('click', (e) => { e.stopPropagation(); zoomAtCenter(1.18); });
    btnZoomOut.addEventListener('click', (e) => { e.stopPropagation(); zoomAtCenter(1 / 1.18); });
    btnHome.addEventListener('click', (e) => { e.stopPropagation(); panOffset = { x: 0, y: 0 }; zoomScale = 1.0; draw(); showToast("화면이 중앙으로 정렬되었습니다."); });

    function zoomAtCenter(factor) {
      const centerX = canvas.width / (2 * (window.devicePixelRatio || 1)); const centerY = canvas.height / (2 * (window.devicePixelRatio || 1));
      const workspacePosBefore = screenToWorkspace({ x: centerX, y: centerY });
      zoomScale = Math.max(0.4, Math.min(zoomScale * factor, 5.0));
      panOffset.x = centerX - workspacePosBefore.x * zoomScale; panOffset.y = centerY - workspacePosBefore.y * zoomScale; draw();
    }

    function saveState() { undoHistory.push(JSON.stringify(drawings)); if (undoHistory.length > 50) undoHistory.shift(); }
    document.getElementById('btnUndo').addEventListener('click', () => {
      if (undoHistory.length > 0) { drawings = JSON.parse(undoHistory.pop()); draw(); showToast("실행 취소했습니다."); }
    });
    document.getElementById('btnClear').addEventListener('click', () => {
      if (drawings.length === 0) return; saveState(); drawings = []; draw(); showToast("화면을 깨끗하게 지웠습니다.");
    });
    
    document.getElementById('toggleCompass').addEventListener('change', (e) => { compass.active = e.target.checked; draw(); });
    
    document.querySelectorAll('.color-dot').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.color-dot').forEach(d => {
          d.classList.remove('ring-2', 'scale-110');
        });
        currentColor = e.target.getAttribute('data-color');
        e.target.classList.add('ring-2', 'scale-110'); 
        draw();
      });
    });

    document.getElementById('customColorPicker').addEventListener('input', (e) => {
      currentColor = e.target.value;
      document.querySelectorAll('.color-dot').forEach(d => {
        d.classList.remove('ring-2', 'scale-110');
      });
      draw();
    });

    document.getElementById('lineWidth').addEventListener('input', (e) => {
      currentLineWidth = parseFloat(e.target.value); 
    });

    const exportBtnLogic = () => {
      const exportCanvas = document.createElement('canvas'); exportCanvas.width = canvas.width; exportCanvas.height = canvas.height;
      const exportCtx = exportCanvas.getContext('2d'); const dpi = window.devicePixelRatio || 1; exportCtx.scale(dpi, dpi);
      
      const currentProb = appState.problems[appState.currentIndex];

      if (loadedBgImageElement) {
        const scale = currentProb.bgScale || 1.0;
        const scaledW = currentProb.bgWidth * scale;
        const scaledH = currentProb.bgHeight * scale;
        const offsetX = currentProb.bgX + (currentProb.bgWidth - scaledW) / 2;
        const offsetY = currentProb.bgY + (currentProb.bgHeight - scaledH) / 2;
        exportCtx.drawImage(loadedBgImageElement, offsetX, offsetY, scaledW, scaledH);
      }
      
      exportCtx.lineCap = 'round'; exportCtx.lineJoin = 'round';
      drawings.forEach(shape => {
        exportCtx.strokeStyle = shape.color; exportCtx.lineWidth = shape.width;
        if (shape.type === 'line') { exportCtx.beginPath(); exportCtx.moveTo(shape.x1, shape.y1); exportCtx.lineTo(shape.x2, shape.y2); exportCtx.stroke(); }
        else if (shape.type === 'arc') { exportCtx.beginPath(); exportCtx.arc(shape.cx, shape.cy, shape.r, shape.startAngle, shape.endAngle, shape.startAngle > shape.endAngle); exportCtx.stroke(); }
        else if (shape.type === 'free') {
          if (shape.points.length < 2) return; exportCtx.beginPath(); exportCtx.moveTo(shape.points[0].x, shape.points[0].y);
          for (let i = 1; i < shape.points.length; i++) exportCtx.lineTo(shape.points[i].x, shape.points[i].y); exportCtx.stroke();
        } else if (shape.type === 'point') {
          exportCtx.fillStyle = shape.color;
          exportCtx.beginPath();
          exportCtx.arc(shape.x, shape.y, shape.width + 2, 0, Math.PI * 2);
          exportCtx.fill();
        }
      });
      const dataUrl = exportCanvas.toDataURL('image/png'); const link = document.createElement('a');
      link.download = `작도수행평가_${currentProb.title}.png`; link.href = dataUrl; link.click(); showToast("저장되었습니다.");
    };

    document.getElementById('btnExportAll').addEventListener('click', exportBtnLogic);

    const btnToggleSidebar = document.getElementById('btnToggleSidebar');
    const sidebar = document.getElementById('sidebar');
    let sidebarOpen = true;
    
    btnToggleSidebar.addEventListener('click', () => {
      sidebarOpen = !sidebarOpen;
      if(sidebarOpen) {
        sidebar.classList.remove('-translate-x-full');
        sidebar.classList.add('w-24'); 
      } else {
        sidebar.classList.add('-translate-x-full');
        sidebar.classList.remove('w-24');
      }
    });

    function getMousePos(e) { const rect = canvas.getBoundingClientRect(); return { x: e.clientX - rect.left, y: e.clientY - rect.top }; }

    window.addEventListener('load', () => {
      resizeCanvas();
      
      if (isStudentMode && appState.problems.length > 0) {
        document.getElementById('teacherControls').classList.add('hidden');
        document.getElementById('studentControls').classList.remove('hidden');
        document.getElementById('studentControls').classList.add('flex');
        renderSidebar();
        loadProblem(0);
        showToast("선생님이 배포한 학습지를 불러왔습니다.");
      } else if(appState.problems.length > 0) {
        renderSidebar();
        loadProblem(0);
      }
    });
  </script>

</body>
</html>
