        const PictureToCoordinateActivity = () => {
            const xMin = -14;
            const xMax = 14;
            const yMin = -15;
            const yMax = 14;
            const svgRef = useRef(null);
            const mathGroupRef = useRef(null);
            const nextStrokeIdRef = useRef(2);
            const nextPointIdRef = useRef(1);
            const draggingRef = useRef(false);
            const draggingPointRef = useRef(null);
            const coloringRef = useRef(false);
            const lastPointerRef = useRef({ x: 0, y: 0 });

            const [strokes, setStrokes] = useState([
                { id: 1, points: [], closed: false }
            ]);
            const [answers, setAnswers] = useState({});
            const [answerResults, setAnswerResults] = useState({});
            const [showHelp, setShowHelp] = useState(true);
            const [tool, setTool] = useState('draw');
            const [zoom, setZoom] = useState(1);
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [phase, setPhase] = useState('drawing');
            const [editingStrokeId, setEditingStrokeId] = useState(null);
            const [artworkTitle, setArtworkTitle] = useState('');
            const [studentInfo, setStudentInfo] = useState('');

            // 완료 후 색칠 상태
            const [selectedColor, setSelectedColor] = useState('#f97316');
            const [brushSize, setBrushSize] = useState(1.1);
            const [colorActions, setColorActions] = useState([]);
            const [currentColorStroke, setCurrentColorStroke] = useState(null);

            const isColoring = phase === 'coloring';

            const COLOR_PALETTE = [
                '#ef4444', '#f97316', '#facc15', '#22c55e',
                '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899',
                '#92400e', '#111827'
            ];

            const nonEmptyStrokes = useMemo(
                () => strokes.filter(stroke => stroke.points.length > 0),
                [strokes]
            );

            const flatPoints = useMemo(() => {
                const result = [];
                strokes.forEach((stroke, strokeIndex) => {
                    stroke.points.forEach((point, pointIndex) => {
                        result.push({ ...point, strokeId: stroke.id, strokeIndex, pointIndex });
                    });
                });
                return result;
            }, [strokes]);

            const pointCoordinateKey = (point) => {
                const x = Math.round(point.x * 1000000) / 1000000;
                const y = Math.round(point.y * 1000000) / 1000000;
                return `${x},${y}`;
            };

            // 같은 Shape 안에서 같은 좌표를 여러 번 지나갈 때만 순서쌍 입력칸을 한 번 표시합니다.
            // 다른 Shape에서 같은 좌표를 다시 사용한 경우에는 해당 Shape의 순서쌍으로 다시 표시합니다.
            // 선을 그리는 경로에는 반복 지점을 그대로 남겨 두므로 그림 모양은 바뀌지 않습니다.
            const uniqueFlatPoints = useMemo(() => {
                const seenCoordinatesByStroke = new Set();
                return flatPoints.filter(point => {
                    const key = `${point.strokeId}|${pointCoordinateKey(point)}`;
                    if (seenCoordinatesByStroke.has(key)) return false;
                    seenCoordinatesByStroke.add(key);
                    return true;
                });
            }, [flatPoints]);

            const uniquePointIdSet = useMemo(
                () => new Set(uniqueFlatPoints.map(point => point.id)),
                [uniqueFlatPoints]
            );

            const pointNumberById = useMemo(() => {
                const map = new Map();
                const numberByCoordinate = new Map();
                let nextNumber = 1;

                // 같은 좌표를 다시 선택한 경우에는 새로운 점 번호를 만들지 않고
                // 그 좌표에 처음 부여된 번호를 계속 사용합니다.
                flatPoints.forEach(point => {
                    const coordinateKey = pointCoordinateKey(point);

                    if (!numberByCoordinate.has(coordinateKey)) {
                        numberByCoordinate.set(coordinateKey, nextNumber);
                        nextNumber += 1;
                    }

                    map.set(point.id, numberByCoordinate.get(coordinateKey));
                });
                return map;
            }, [flatPoints]);


            const screenPointToSvg = (clientX, clientY) => {
                const svg = svgRef.current;
                if (!svg) return null;

                const point = svg.createSVGPoint();
                point.x = clientX;
                point.y = clientY;
                const ctm = svg.getScreenCTM();
                if (!ctm) return null;
                return point.matrixTransform(ctm.inverse());
            };

            const screenPointToMath = (clientX, clientY) => {
                const svg = svgRef.current;
                const mathGroup = mathGroupRef.current;
                if (!svg || !mathGroup) return null;

                const point = svg.createSVGPoint();
                point.x = clientX;
                point.y = clientY;
                const ctm = mathGroup.getScreenCTM();
                if (!ctm) return null;
                return point.matrixTransform(ctm.inverse());
            };

            const pointsMatch = (a, b) => !!a && !!b && a.x === b.x && a.y === b.y;

            const clearAllChecking = () => {
                setAnswerResults({});
                setPhase('drawing');
            };

            const clearColoringForGeometryChange = () => {
                setColorActions([]);
                setCurrentColorStroke(null);
            };

            const clearPointResult = (pointId) => {
                setAnswerResults(previous => {
                    const next = { ...previous };
                    delete next[pointId];
                    return next;
                });
                setPhase('drawing');
            };

            const addPointAt = (clientX, clientY) => {
                const mathPoint = screenPointToMath(clientX, clientY);
                if (!mathPoint) return;

                const x = Math.round(mathPoint.x);
                const y = Math.round(mathPoint.y);
                if (x < xMin || x > xMax || y < yMin || y > yMax) return;

                const editingIndex = editingStrokeId === null
                    ? -1
                    : strokes.findIndex(stroke => stroke.id === editingStrokeId);
                const targetIndex = editingIndex >= 0 ? editingIndex : strokes.length - 1;
                const targetStroke = strokes[targetIndex];

                // 같은 점을 연속으로 두 번 누르면 중복 점을 만들지 않습니다.
                if (targetStroke && pointsMatch(targetStroke.points[targetStroke.points.length - 1], { x, y })) {
                    return;
                }

                // 세 점 이상 찍은 뒤 첫 점을 다시 누르면 새 번호 없이 자동으로 닫습니다.
                if (
                    targetStroke &&
                    !targetStroke.closed &&
                    targetStroke.points.length >= 3 &&
                    pointsMatch(targetStroke.points[0], { x, y })
                ) {
                    setStrokes(previous => previous.map(stroke =>
                        stroke.id === targetStroke.id ? { ...stroke, closed: true } : stroke
                    ));
                    setShowHelp(false);
                    clearAllChecking();
                    clearColoringForGeometryChange();
                    return;
                }

                const newPoint = {
                    id: nextPointIdRef.current++,
                    x,
                    y
                };

                setStrokes(previous => {
                    const next = previous.map(stroke => ({
                        ...stroke,
                        points: [...stroke.points]
                    }));

                    const selectedIndex = editingStrokeId === null
                        ? -1
                        : next.findIndex(stroke => stroke.id === editingStrokeId);

                    if (selectedIndex >= 0) {
                        next[selectedIndex].points.push(newPoint);
                        return next;
                    }

                    let currentIndex = next.length - 1;
                    if (!next[currentIndex] || next[currentIndex].closed) {
                        next.push({
                            id: nextStrokeIdRef.current++,
                            points: [],
                            closed: false
                        });
                        currentIndex = next.length - 1;
                    }

                    next[currentIndex].points.push(newPoint);
                    return next;
                });

                setAnswers(previous => ({
                    ...previous,
                    [newPoint.id]: { x: '0', y: '0' }
                }));
                setShowHelp(false);
                clearAllChecking();
                clearColoringForGeometryChange();
            };

            const startPointDrag = (event, point) => {
                if (phase !== 'drawing' || tool !== 'draw' || editingStrokeId !== point.strokeId) return;
                event.preventDefault();
                event.stopPropagation();
                draggingPointRef.current = { pointId: point.id, strokeId: point.strokeId };
                svgRef.current?.setPointerCapture?.(event.pointerId);
            };

            const pointInPolygon = (point, polygon) => {
                let inside = false;
                for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                    const xi = polygon[i].x;
                    const yi = polygon[i].y;
                    const xj = polygon[j].x;
                    const yj = polygon[j].y;
                    const intersects = ((yi > point.y) !== (yj > point.y)) &&
                        (point.x < ((xj - xi) * (point.y - yi)) / ((yj - yi) || Number.EPSILON) + xi);
                    if (intersects) inside = !inside;
                }
                return inside;
            };

            const polygonArea = (points) => {
                let area = 0;
                for (let i = 0; i < points.length; i += 1) {
                    const next = points[(i + 1) % points.length];
                    area += points[i].x * next.y - next.x * points[i].y;
                }
                return Math.abs(area) / 2;
            };

            const geometryEpsilon = 1e-7;
            const arrayPointKey = (point) => {
                const x = Math.round(point[0] * 1000000) / 1000000;
                const y = Math.round(point[1] * 1000000) / 1000000;
                return `${x},${y}`;
            };
            const subtractArrayPoints = (a, b) => [a[0] - b[0], a[1] - b[1]];
            const crossArrayProduct = (a, b) => a[0] * b[1] - a[1] * b[0];
            const arraysPointSame = (a, b) => !!a && !!b && Math.abs(a[0] - b[0]) < geometryEpsilon && Math.abs(a[1] - b[1]) < geometryEpsilon;

            const pointOnArraySegment = (point, start, end) => {
                const cross = crossArrayProduct(subtractArrayPoints(point, start), subtractArrayPoints(end, start));
                if (Math.abs(cross) > geometryEpsilon) return false;
                return point[0] >= Math.min(start[0], end[0]) - geometryEpsilon &&
                    point[0] <= Math.max(start[0], end[0]) + geometryEpsilon &&
                    point[1] >= Math.min(start[1], end[1]) - geometryEpsilon &&
                    point[1] <= Math.max(start[1], end[1]) + geometryEpsilon;
            };

            const getArraySegmentIntersections = (a, b, c, d) => {
                const r = subtractArrayPoints(b, a);
                const s = subtractArrayPoints(d, c);
                const rCrossS = crossArrayProduct(r, s);
                const cMinusA = subtractArrayPoints(c, a);
                const cMinusACrossR = crossArrayProduct(cMinusA, r);

                if (Math.abs(rCrossS) > geometryEpsilon) {
                    const t = crossArrayProduct(cMinusA, s) / rCrossS;
                    const u = crossArrayProduct(cMinusA, r) / rCrossS;
                    if (t >= -geometryEpsilon && t <= 1 + geometryEpsilon &&
                        u >= -geometryEpsilon && u <= 1 + geometryEpsilon) {
                        return [[a[0] + t * r[0], a[1] + t * r[1]]];
                    }
                    return [];
                }

                if (Math.abs(cMinusACrossR) > geometryEpsilon) return [];

                const candidates = [a, b, c, d].filter(point =>
                    pointOnArraySegment(point, a, b) && pointOnArraySegment(point, c, d)
                );
                return candidates.filter((point, index) =>
                    candidates.findIndex(other => arraysPointSame(point, other)) === index
                );
            };

            const signedRingArea = (ring) => {
                let area = 0;
                for (let i = 0; i < ring.length - 1; i += 1) {
                    area += ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
                }
                return area / 2;
            };

            const ringArea = (ring) => Math.abs(signedRingArea(ring));

            const pointInRing = (point, ring) => {
                const x = point.x ?? point[0];
                const y = point.y ?? point[1];
                let inside = false;
                for (let i = 0, j = ring.length - 2; i < ring.length - 1; j = i++) {
                    const xi = ring[i][0];
                    const yi = ring[i][1];
                    const xj = ring[j][0];
                    const yj = ring[j][1];
                    const crosses = ((yi > y) !== (yj > y)) &&
                        (x < ((xj - xi) * (y - yi)) / ((yj - yi) || Number.EPSILON) + xi);
                    if (crosses) inside = !inside;
                }
                return inside;
            };

            const findRingInteriorPoint = (ring) => {
                const area = signedRingArea(ring);
                if (Math.abs(area) > geometryEpsilon) {
                    let cx = 0;
                    let cy = 0;
                    for (let i = 0; i < ring.length - 1; i += 1) {
                        const factor = ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
                        cx += (ring[i][0] + ring[i + 1][0]) * factor;
                        cy += (ring[i][1] + ring[i + 1][1]) * factor;
                    }
                    const centroid = [cx / (6 * area), cy / (6 * area)];
                    if (pointInRing(centroid, ring)) return centroid;
                }

                const xs = ring.slice(0, -1).map(point => point[0]);
                const ys = ring.slice(0, -1).map(point => point[1]);
                const minX = Math.min(...xs);
                const maxX = Math.max(...xs);
                const minY = Math.min(...ys);
                const maxY = Math.max(...ys);

                for (let row = 1; row < 20; row += 1) {
                    for (let col = 1; col < 20; col += 1) {
                        const sample = [
                            minX + ((maxX - minX) * col) / 20,
                            minY + ((maxY - minY) * row) / 20
                        ];
                        if (pointInRing(sample, ring)) return sample;
                    }
                }

                return ring[0];
            };

            const normalizeRingKey = (ring) => {
                const keys = ring.slice(0, -1).map(arrayPointKey);
                let best = null;
                for (let start = 0; start < keys.length; start += 1) {
                    const candidate = keys.slice(start).concat(keys.slice(0, start)).join(';');
                    if (best === null || candidate < best) best = candidate;
                }
                return best || '';
            };

            const buildFillRegionsFromStrokes = (targetStrokes) => {
                const segments = [];

                targetStrokes.forEach(stroke => {
                    const points = stroke.points.map(point => [point.x, point.y]);
                    for (let index = 0; index < points.length - 1; index += 1) {
                        const start = points[index];
                        const end = points[index + 1];
                        if (!arraysPointSame(start, end)) {
                            segments.push({ start, end, splitPoints: [start, end] });
                        }
                    }
                    if (stroke.closed && points.length >= 3) {
                        const start = points[points.length - 1];
                        const end = points[0];
                        if (!arraysPointSame(start, end)) {
                            segments.push({ start, end, splitPoints: [start, end] });
                        }
                    }
                });

                for (let i = 0; i < segments.length; i += 1) {
                    for (let j = i + 1; j < segments.length; j += 1) {
                        const intersections = getArraySegmentIntersections(
                            segments[i].start,
                            segments[i].end,
                            segments[j].start,
                            segments[j].end
                        );
                        intersections.forEach(point => {
                            segments[i].splitPoints.push(point);
                            segments[j].splitPoints.push(point);
                        });
                    }
                }

                const nodes = new Map();
                const edges = new Map();

                const addNode = (point) => {
                    const key = arrayPointKey(point);
                    if (!nodes.has(key)) {
                        nodes.set(key, [
                            Math.round(point[0] * 1000000) / 1000000,
                            Math.round(point[1] * 1000000) / 1000000
                        ]);
                    }
                    return key;
                };

                segments.forEach(segment => {
                    const dx = segment.end[0] - segment.start[0];
                    const dy = segment.end[1] - segment.start[1];
                    const denominator = dx * dx + dy * dy || 1;
                    const uniquePoints = segment.splitPoints.filter((point, index, list) =>
                        list.findIndex(other => arraysPointSame(point, other)) === index
                    );

                    uniquePoints.sort((a, b) => {
                        const ta = ((a[0] - segment.start[0]) * dx + (a[1] - segment.start[1]) * dy) / denominator;
                        const tb = ((b[0] - segment.start[0]) * dx + (b[1] - segment.start[1]) * dy) / denominator;
                        return ta - tb;
                    });

                    for (let index = 0; index < uniquePoints.length - 1; index += 1) {
                        const startKey = addNode(uniquePoints[index]);
                        const endKey = addNode(uniquePoints[index + 1]);
                        if (startKey === endKey) continue;
                        const edgeKey = startKey < endKey ? `${startKey}|${endKey}` : `${endKey}|${startKey}`;
                        edges.set(edgeKey, [startKey, endKey]);
                    }
                });

                const adjacency = new Map();
                edges.forEach(([startKey, endKey]) => {
                    if (!adjacency.has(startKey)) adjacency.set(startKey, []);
                    if (!adjacency.has(endKey)) adjacency.set(endKey, []);
                    adjacency.get(startKey).push(endKey);
                    adjacency.get(endKey).push(startKey);
                });

                adjacency.forEach((neighbors, nodeKey) => {
                    const node = nodes.get(nodeKey);
                    neighbors.sort((aKey, bKey) => {
                        const a = nodes.get(aKey);
                        const b = nodes.get(bKey);
                        return Math.atan2(a[1] - node[1], a[0] - node[0]) - Math.atan2(b[1] - node[1], b[0] - node[0]);
                    });
                });

                const visitedHalfEdges = new Set();
                const cycles = [];
                const maximumSteps = edges.size * 3 + 20;

                edges.forEach(([edgeStart, edgeEnd]) => {
                    [[edgeStart, edgeEnd], [edgeEnd, edgeStart]].forEach(([startFrom, startTo]) => {
                        const firstHalfEdge = `${startFrom}>${startTo}`;
                        if (visitedHalfEdges.has(firstHalfEdge)) return;

                        let from = startFrom;
                        let to = startTo;
                        const ring = [];
                        let closed = false;

                        for (let step = 0; step < maximumSteps; step += 1) {
                            const halfEdgeKey = `${from}>${to}`;
                            if (visitedHalfEdges.has(halfEdgeKey) && !(from === startFrom && to === startTo && step > 0)) {
                                break;
                            }

                            visitedHalfEdges.add(halfEdgeKey);
                            ring.push(nodes.get(from));

                            const neighbors = adjacency.get(to) || [];
                            const reverseIndex = neighbors.indexOf(from);
                            if (reverseIndex < 0 || neighbors.length === 0) break;

                            const next = neighbors[(reverseIndex - 1 + neighbors.length) % neighbors.length];
                            from = to;
                            to = next;

                            if (from === startFrom && to === startTo) {
                                closed = true;
                                break;
                            }
                        }

                        if (closed && ring.length >= 3) {
                            ring.push(ring[0]);
                            const signedArea = signedRingArea(ring);
                            if (signedArea > geometryEpsilon) {
                                cycles.push({ ring, area: signedArea });
                            }
                        }
                    });
                });

                const uniqueCycles = [];
                const cycleKeys = new Set();
                cycles.forEach(cycle => {
                    const key = normalizeRingKey(cycle.ring);
                    if (!cycleKeys.has(key)) {
                        cycleKeys.add(key);
                        uniqueCycles.push(cycle);
                    }
                });

                uniqueCycles.forEach((cycle, cycleIndex) => {
                    const samplePoint = findRingInteriorPoint(cycle.ring);
                    let parentIndex = -1;
                    let parentArea = Infinity;

                    uniqueCycles.forEach((candidate, candidateIndex) => {
                        if (candidateIndex === cycleIndex || candidate.area <= cycle.area + geometryEpsilon) return;
                        if (pointInRing(samplePoint, candidate.ring) && candidate.area < parentArea) {
                            parentIndex = candidateIndex;
                            parentArea = candidate.area;
                        }
                    });

                    cycle.parentIndex = parentIndex;
                    cycle.children = [];
                });

                uniqueCycles.forEach((cycle, cycleIndex) => {
                    if (cycle.parentIndex >= 0) {
                        uniqueCycles[cycle.parentIndex].children.push(cycleIndex);
                    }
                });

                return uniqueCycles.map((cycle, regionIndex) => ({
                    id: `free-region-${regionIndex}`,
                    rings: [cycle.ring, ...cycle.children.map(childIndex => uniqueCycles[childIndex].ring)],
                    area: cycle.area
                }));
            };

            const pointInFreeFillRegion = (point, region) => {
                if (!region || !region.rings || region.rings.length === 0) return false;
                if (!pointInRing(point, region.rings[0])) return false;
                return !region.rings.slice(1).some(hole => pointInRing(point, hole));
            };

            const ringsToFreePath = (rings) => (rings || []).map(ring => {
                if (!ring || ring.length === 0) return '';
                return `M ${ring.map(point => `${point[0]} ${point[1]}`).join(' L ')} Z`;
            }).join(' ');


            const freeFillRegions = useMemo(
                () => buildFillRegionsFromStrokes(strokes.filter(stroke => stroke.points.length >= 2)),
                [strokes]
            );

            const findFreeFillRegionAt = (point) => {
                const candidates = freeFillRegions
                    .filter(region => pointInFreeFillRegion(point, region))
                    .sort((a, b) => a.area - b.area);
                return candidates.length > 0 ? candidates[0] : null;
            };

            const distancePointToSegment = (point, start, end) => {
                const dx = end.x - start.x;
                const dy = end.y - start.y;
                const lengthSquared = dx * dx + dy * dy;
                if (lengthSquared === 0) return Math.hypot(point.x - start.x, point.y - start.y);
                const t = Math.max(0, Math.min(1,
                    ((point.x - start.x) * dx + (point.y - start.y) * dy) / lengthSquared
                ));
                const projectionX = start.x + t * dx;
                const projectionY = start.y + t * dy;
                return Math.hypot(point.x - projectionX, point.y - projectionY);
            };

            const findNearestSegment = (point) => {
                let best = null;
                strokes.forEach(stroke => {
                    const segmentCount = stroke.closed ? stroke.points.length : stroke.points.length - 1;
                    for (let index = 0; index < segmentCount; index += 1) {
                        const start = stroke.points[index];
                        const end = stroke.points[(index + 1) % stroke.points.length];
                        if (!start || !end) continue;
                        const distance = distancePointToSegment(point, start, end);
                        if (!best || distance < best.distance) {
                            best = { strokeId: stroke.id, segmentIndex: index, distance };
                        }
                    }
                });
                return best && best.distance <= 0.42 ? best : null;
            };

            const removeAnswerData = (pointIds) => {
                setAnswers(previous => {
                    const next = { ...previous };
                    pointIds.forEach(id => delete next[id]);
                    return next;
                });
                setAnswerResults(previous => {
                    const next = { ...previous };
                    pointIds.forEach(id => delete next[id]);
                    return next;
                });
            };

            const deletePointById = (strokeId, pointId) => {
                const targetStroke = strokes.find(stroke => stroke.id === strokeId);
                if (!targetStroke) return;

                setStrokes(previous => {
                    const next = previous
                        .map(stroke => {
                            if (stroke.id !== strokeId) return stroke;
                            const points = stroke.points.filter(point => point.id !== pointId);
                            return {
                                ...stroke,
                                points,
                                closed: stroke.closed && points.length >= 3
                            };
                        })
                        .filter(stroke => stroke.points.length > 0);

                    return next.length > 0
                        ? next
                        : [{ id: nextStrokeIdRef.current++, points: [], closed: false }];
                });

                removeAnswerData([pointId]);
                clearAllChecking();
                clearColoringForGeometryChange();
            };

            const deleteSegmentAt = (strokeId, segmentIndex) => {
                setStrokes(previous => {
                    const targetIndex = previous.findIndex(stroke => stroke.id === strokeId);
                    if (targetIndex < 0) return previous;
                    const target = previous[targetIndex];
                    if (target.points.length < 2) return previous;

                    const replacement = [];

                    if (target.closed) {
                        if (segmentIndex === target.points.length - 1) {
                            replacement.push({ ...target, closed: false });
                        } else {
                            const rotated = [
                                ...target.points.slice(segmentIndex + 1),
                                ...target.points.slice(0, segmentIndex + 1)
                            ];
                            replacement.push({ ...target, points: rotated, closed: false });
                        }
                    } else {
                        const left = target.points.slice(0, segmentIndex + 1);
                        const right = target.points.slice(segmentIndex + 1);
                        if (left.length > 0) {
                            replacement.push({ ...target, points: left, closed: false });
                        }
                        if (right.length > 0) {
                            replacement.push({
                                id: nextStrokeIdRef.current++,
                                points: right,
                                closed: false
                            });
                        }
                    }

                    const next = [
                        ...previous.slice(0, targetIndex),
                        ...replacement,
                        ...previous.slice(targetIndex + 1)
                    ];
                    return next.length > 0
                        ? next
                        : [{ id: nextStrokeIdRef.current++, points: [], closed: false }];
                });

                setEditingStrokeId(null);
                clearAllChecking();
                clearColoringForGeometryChange();
            };

            const beginColorStroke = (event, isEraser) => {
                const point = screenPointToMath(event.clientX, event.clientY);
                if (!point) return;
                coloringRef.current = true;
                setCurrentColorStroke({
                    type: isEraser ? 'erase' : 'stroke',
                    color: isEraser ? '#ffffff' : selectedColor,
                    width: isEraser ? brushSize * 1.8 : brushSize,
                    opacity: isEraser ? 1 : 0.78,
                    points: [[point.x, point.y]]
                });
                event.currentTarget.setPointerCapture?.(event.pointerId);
            };

            const handlePointerDown = (event) => {
                if (tool === 'pan') {
                    event.preventDefault();
                    event.stopPropagation();
                    const point = screenPointToSvg(event.clientX, event.clientY);
                    if (!point) return;
                    draggingRef.current = true;
                    setIsDragging(true);
                    lastPointerRef.current = { x: point.x, y: point.y };
                    event.currentTarget.setPointerCapture?.(event.pointerId);
                    return;
                }

                if (phase === 'drawing') {
                    if (tool === 'draw') {
                        event.preventDefault();
                        event.stopPropagation();
                        addPointAt(event.clientX, event.clientY);
                    } else if (tool === 'segment-erase') {
                        event.preventDefault();
                        event.stopPropagation();
                        const point = screenPointToMath(event.clientX, event.clientY);
                        if (!point) return;
                        const segment = findNearestSegment(point);
                        if (segment) deleteSegmentAt(segment.strokeId, segment.segmentIndex);
                    }
                    return;
                }

                if (phase === 'coloring') {
                    if (tool === 'fill') {
                        event.preventDefault();
                        event.stopPropagation();
                        const point = screenPointToMath(event.clientX, event.clientY);
                        if (!point) return;
                        const region = findFreeFillRegionAt(point);
                        if (region) {
                            setColorActions(previous => [
                                ...previous,
                                {
                                    type: 'fill',
                                    color: selectedColor,
                                    rings: region.rings.map(ring => ring.map(([x, y]) => [x, y]))
                                }
                            ]);
                        }
                    } else if (tool === 'brush' || tool === 'eraser') {
                        event.preventDefault();
                        event.stopPropagation();
                        beginColorStroke(event, tool === 'eraser');
                    }
                }
            };

            const handlePointerMove = (event) => {
                if (draggingPointRef.current) {
                    event.preventDefault();
                    event.stopPropagation();
                    const mathPoint = screenPointToMath(event.clientX, event.clientY);
                    if (!mathPoint) return;

                    const x = Math.max(xMin, Math.min(xMax, Math.round(mathPoint.x)));
                    const y = Math.max(yMin, Math.min(yMax, Math.round(mathPoint.y)));
                    const { pointId, strokeId } = draggingPointRef.current;

                    setStrokes(previous => previous.map(stroke =>
                        stroke.id === strokeId
                            ? {
                                ...stroke,
                                points: stroke.points.map(point =>
                                    point.id === pointId ? { ...point, x, y } : point
                                )
                            }
                            : stroke
                    ));
                    clearColoringForGeometryChange();
                    return;
                }

                if (draggingRef.current && tool === 'pan') {
                    event.preventDefault();
                    event.stopPropagation();
                    const point = screenPointToSvg(event.clientX, event.clientY);
                    if (!point) return;

                    const dx = point.x - lastPointerRef.current.x;
                    const dy = point.y - lastPointerRef.current.y;
                    setPan(previous => ({ x: previous.x + dx, y: previous.y + dy }));
                    lastPointerRef.current = { x: point.x, y: point.y };
                    return;
                }

                if (phase === 'coloring' && coloringRef.current && (tool === 'brush' || tool === 'eraser')) {
                    event.preventDefault();
                    event.stopPropagation();
                    const point = screenPointToMath(event.clientX, event.clientY);
                    if (!point) return;
                    setCurrentColorStroke(previous => {
                        if (!previous) return previous;
                        const last = previous.points[previous.points.length - 1];
                        if (Math.hypot(point.x - last[0], point.y - last[1]) < 0.04) return previous;
                        return { ...previous, points: [...previous.points, [point.x, point.y]] };
                    });
                }
            };

            const handlePointerUp = (event) => {
                if (draggingPointRef.current) {
                    const { pointId } = draggingPointRef.current;
                    draggingPointRef.current = null;
                    clearPointResult(pointId);
                }

                if (draggingRef.current) {
                    draggingRef.current = false;
                    setIsDragging(false);
                }

                if (coloringRef.current) {
                    coloringRef.current = false;
                    setCurrentColorStroke(previous => {
                        if (previous && previous.points.length > 0) {
                            setColorActions(actions => [...actions, previous]);
                        }
                        return null;
                    });
                }

                if (svgRef.current?.hasPointerCapture?.(event.pointerId)) {
                    svgRef.current.releasePointerCapture(event.pointerId);
                } else if (event.currentTarget.hasPointerCapture?.(event.pointerId)) {
                    event.currentTarget.releasePointerCapture(event.pointerId);
                }
            };

            // 좌표평면 위 휠 조작은 페이지가 아닌 좌표평면 확대·축소에만 사용합니다.
            useEffect(() => {
                const svg = svgRef.current;
                if (!svg) return undefined;

                const stopPageWheelAndZoomCanvas = (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    const factor = event.deltaY < 0 ? 1.12 : 0.89;
                    setZoom(previous => Math.max(0.5, Math.min(previous * factor, 4)));
                };

                svg.addEventListener('wheel', stopPageWheelAndZoomCanvas, { passive: false });
                return () => svg.removeEventListener('wheel', stopPageWheelAndZoomCanvas);
            }, [phase]);

            const startNewStroke = () => {
                setEditingStrokeId(null);
                setStrokes(previous => {
                    const last = previous[previous.length - 1];
                    if (!last || last.points.length === 0) return previous;
                    return [
                        ...previous,
                        {
                            id: nextStrokeIdRef.current++,
                            points: [],
                            closed: false
                        }
                    ];
                });
                setTool('draw');
                setPhase('drawing');
            };

            const toggleEditStroke = (strokeId) => {
                setEditingStrokeId(previous => previous === strokeId ? null : strokeId);
                setTool('draw');
                setShowHelp(false);
                setPhase('drawing');
            };

            const undoLastPoint = () => {
                const targetStroke = editingStrokeId === null
                    ? [...strokes].reverse().find(stroke => stroke.points.length > 0)
                    : strokes.find(stroke => stroke.id === editingStrokeId && stroke.points.length > 0);
                if (!targetStroke) return;

                const removedPoint = targetStroke.points[targetStroke.points.length - 1];
                setStrokes(previous => {
                    const next = previous.map(stroke => ({
                        ...stroke,
                        points: [...stroke.points]
                    }));
                    const index = next.findIndex(stroke => stroke.id === targetStroke.id);
                    if (index < 0 || next[index].points.length === 0) return previous;

                    next[index].points.pop();
                    if (next[index].points.length < 3) next[index].closed = false;

                    while (next.length > 1 && next[next.length - 1].points.length === 0 && next[next.length - 1].id !== editingStrokeId) {
                        next.pop();
                    }
                    return next;
                });

                removeAnswerData([removedPoint.id]);
                clearAllChecking();
                clearColoringForGeometryChange();
            };

            const deleteStrokeById = (strokeId) => {
                const targetStroke = strokes.find(stroke => stroke.id === strokeId);
                if (!targetStroke) return;
                const removedIds = targetStroke.points.map(point => point.id);

                setStrokes(previous => {
                    const remaining = previous.filter(stroke => stroke.id !== strokeId);
                    if (remaining.length > 0) return remaining;
                    return [{ id: nextStrokeIdRef.current++, points: [], closed: false }];
                });

                removeAnswerData(removedIds);
                if (editingStrokeId === strokeId) setEditingStrokeId(null);
                setTool('draw');
                clearAllChecking();
                clearColoringForGeometryChange();
            };

            const resetView = () => {
                setZoom(1);
                setPan({ x: 0, y: 0 });
            };

            const resetActivity = () => {
                nextStrokeIdRef.current = 2;
                nextPointIdRef.current = 1;
                setStrokes([{ id: 1, points: [], closed: false }]);
                setAnswers({});
                setAnswerResults({});
                setShowHelp(true);
                setTool('draw');
                setEditingStrokeId(null);
                setPhase('drawing');
                setArtworkTitle('');
                setStudentInfo('');
                setColorActions([]);
                setCurrentColorStroke(null);
                setSelectedColor('#f97316');
                setBrushSize(1.1);
                resetView();
            };

            const normalizeNumberInput = (value) => {
                const next = String(value).replace(/\s/g, '');
                if (/^-?\d*(?:\.\d*)?$/.test(next)) return next;
                return null;
            };

            const updateAnswer = (pointId, axis, value) => {
                const normalized = normalizeNumberInput(value);
                if (normalized === null) return;

                setAnswers(previous => ({
                    ...previous,
                    [pointId]: {
                        x: previous[pointId]?.x ?? '0',
                        y: previous[pointId]?.y ?? '0',
                        [axis]: normalized
                    }
                }));
                clearPointResult(pointId);
            };

            const readNumber = (value) => {
                if (value === '' || value === '-' || value === '.' || value === '-.') return null;
                const number = Number(value);
                return Number.isFinite(number) ? number : null;
            };

            const stepAnswer = (pointId, axis, amount) => {
                const currentValue = readNumber(answers[pointId]?.[axis] ?? '0') ?? 0;
                const minimum = axis === 'x' ? xMin : yMin;
                const maximum = axis === 'x' ? xMax : yMax;
                const nextValue = Math.max(minimum, Math.min(maximum, currentValue + amount));

                setAnswers(previous => ({
                    ...previous,
                    [pointId]: {
                        x: previous[pointId]?.x ?? '0',
                        y: previous[pointId]?.y ?? '0',
                        [axis]: String(nextValue)
                    }
                }));
                clearPointResult(pointId);
            };

            const checkAnswers = () => {
                const results = {};

                uniqueFlatPoints.forEach(point => {
                    const answer = answers[point.id] || {};
                    const xAnswer = readNumber(answer.x ?? '0');
                    const yAnswer = readNumber(answer.y ?? '0');
                    if (xAnswer === null || yAnswer === null) {
                        results[point.id] = 'empty';
                    } else if (Math.abs(xAnswer - point.x) < 1e-8 && Math.abs(yAnswer - point.y) < 1e-8) {
                        results[point.id] = 'correct';
                    } else {
                        results[point.id] = 'wrong';
                    }
                });

                setAnswerResults(results);
            };

            const allCorrect = uniqueFlatPoints.length > 0 && uniqueFlatPoints.every(point => answerResults[point.id] === 'correct');

            const finishActivity = () => {
                if (!allCorrect) return;
                setPhase('coloring');
                setEditingStrokeId(null);
                setTool('fill');
                setShowHelp(false);
                resetView();
            };

            const undoColorAction = () => {
                setColorActions(previous => previous.slice(0, -1));
                setCurrentColorStroke(null);
            };

            const clearColoring = () => {
                setColorActions([]);
                setCurrentColorStroke(null);
            };

            const strokePointsToString = (points) => {
                if (!points || points.length === 0) return '';
                const normalized = points.length === 1 ? [points[0], points[0]] : points;
                return normalized.map(point => `${point[0]},${point[1]}`).join(' ');
            };

            const saveCompletedArtwork = () => {
                if (flatPoints.length === 0) return;

                const canvasWidth = 1400;
                const pairsPerRow = 7;
                const safeArtworkTitle = artworkTitle.trim() || '나의 좌표 그림';
                const safeStudentInfo = studentInfo.trim();
                const coordinateSectionHeight = nonEmptyStrokes.reduce((sum, stroke) => {
                    const displayCount = stroke.points.filter(point => uniquePointIdSet.has(point.id)).length;
                    return sum + 34 + Math.max(1, Math.ceil(displayCount / pairsPerRow)) * 58 + 24;
                }, 0);
                const headingYForLayout = safeStudentInfo ? 112 : 72;
                const topHeight = Math.max(300, headingYForLayout + 60 + coordinateSectionHeight + 20);
                const graphHeight = 1200;
                const canvas = document.createElement('canvas');
                canvas.width = canvasWidth;
                canvas.height = topHeight + graphHeight;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 위쪽: 작품 이름, 학번 이름, Shape별 순서쌍을 표시합니다.
                ctx.fillStyle = '#0f172a';
                ctx.font = '700 46px Arial, sans-serif';
                ctx.fillText(safeArtworkTitle, 60, 72);

                let headingY = 72;
                if (safeStudentInfo) {
                    ctx.fillStyle = '#334155';
                    ctx.font = '700 26px Arial, sans-serif';
                    ctx.fillText(safeStudentInfo, 60, 112);
                    headingY = 112;
                }

                let pairY = headingY + 60;
                nonEmptyStrokes.forEach((stroke, strokeIndex) => {
                    ctx.fillStyle = '#334155';
                    ctx.font = '700 23px Arial, sans-serif';
                    ctx.fillText(`Shape ${strokeIndex + 1}`, 60, pairY);
                    pairY += 34;

                    const displayPoints = stroke.points
                        .filter(point => uniquePointIdSet.has(point.id))
                        .map(point => ({
                            number: pointNumberById.get(point.id),
                            x: point.x,
                            y: point.y,
                            close: false
                        }));

                    displayPoints.forEach((point, index) => {
                        const column = index % pairsPerRow;
                        const row = Math.floor(index / pairsPerRow);
                        const cardX = 60 + column * 185;
                        const cardY = pairY + row * 58;
                        ctx.fillStyle = point.close ? '#ecfdf5' : '#eef2ff';
                        ctx.strokeStyle = point.close ? '#6ee7b7' : '#c7d2fe';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.roundRect(cardX, cardY, 165, 42, 10);
                        ctx.fill();
                        ctx.stroke();

                        ctx.fillStyle = '#4f46e5';
                        ctx.beginPath();
                        ctx.arc(cardX + 23, cardY + 21, 14, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#ffffff';
                        ctx.font = '700 16px Arial, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(String(point.number), cardX + 23, cardY + 21);

                        ctx.fillStyle = '#1e293b';
                        ctx.font = '700 19px Arial, sans-serif';
                        ctx.textAlign = 'left';
                        ctx.fillText(`(${point.x}, ${point.y})`, cardX + 47, cardY + 21);
                    });

                    pairY += Math.max(1, Math.ceil(displayPoints.length / pairsPerRow)) * 58 + 24;
                });

                // 아래쪽: 색칠된 완성 작품. 점 번호와 점 표시는 저장하지 않습니다.
                const graphTop = topHeight;
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(0, graphTop, canvasWidth, graphHeight);
                const marginX = 95;
                const marginTop = 45;
                const marginBottom = 70;
                const plotWidth = canvasWidth - marginX * 2;
                const plotHeight = graphHeight - marginTop - marginBottom;
                const scale = Math.min(plotWidth / (xMax - xMin), plotHeight / (yMax - yMin));
                const actualWidth = (xMax - xMin) * scale;
                const actualHeight = (yMax - yMin) * scale;
                const plotLeft = (canvasWidth - actualWidth) / 2;
                const plotTop = graphTop + marginTop + (plotHeight - actualHeight) / 2;
                const sx = x => plotLeft + (x - xMin) * scale;
                const sy = y => plotTop + (yMax - y) * scale;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(plotLeft, plotTop, actualWidth, actualHeight);

                colorActions.forEach(action => {
                    if (action.type === 'fill') {
                        const rings = action.rings || (action.points ? [action.points] : []);
                        if (rings.length === 0) return;
                        ctx.beginPath();
                        rings.forEach(ring => {
                            if (!ring || ring.length < 3) return;
                            ring.forEach((point, index) => {
                                const px = sx(point[0]);
                                const py = sy(point[1]);
                                if (index === 0) ctx.moveTo(px, py);
                                else ctx.lineTo(px, py);
                            });
                            ctx.closePath();
                        });
                        ctx.globalAlpha = 0.76;
                        ctx.fillStyle = action.color;
                        ctx.fill('evenodd');
                        ctx.globalAlpha = 1;
                    } else {
                        if (!action.points || action.points.length === 0) return;
                        ctx.beginPath();
                        action.points.forEach((point, index) => {
                            const px = sx(point[0]);
                            const py = sy(point[1]);
                            if (index === 0) ctx.moveTo(px, py);
                            else ctx.lineTo(px, py);
                        });
                        if (action.points.length === 1) {
                            ctx.lineTo(sx(action.points[0][0]) + 0.01, sy(action.points[0][1]));
                        }
                        ctx.strokeStyle = action.color;
                        ctx.lineWidth = action.width * scale;
                        ctx.globalAlpha = action.opacity ?? 0.78;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                });

                // 격자와 축은 색칠 위에 다시 그립니다.
                ctx.strokeStyle = '#d6dde8';
                ctx.lineWidth = 1;
                for (let x = xMin; x <= xMax; x += 1) {
                    ctx.beginPath();
                    ctx.moveTo(sx(x), sy(yMin));
                    ctx.lineTo(sx(x), sy(yMax));
                    ctx.stroke();
                }
                for (let y = yMin; y <= yMax; y += 1) {
                    ctx.beginPath();
                    ctx.moveTo(sx(xMin), sy(y));
                    ctx.lineTo(sx(xMax), sy(y));
                    ctx.stroke();
                }

                ctx.strokeStyle = '#111827';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(sx(xMin), sy(0));
                ctx.lineTo(sx(xMax), sy(0));
                ctx.moveTo(sx(0), sy(yMin));
                ctx.lineTo(sx(0), sy(yMax));
                ctx.stroke();

                ctx.fillStyle = '#475569';
                ctx.font = '15px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                for (let x = xMin; x <= xMax; x += 1) {
                    if (x !== 0 && x !== xMax) ctx.fillText(String(x), sx(x), sy(0) + 7);
                }
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                for (let y = yMin; y <= yMax; y += 1) {
                    if (y !== 0 && y !== yMax) ctx.fillText(String(y), sx(0) - 7, sy(y));
                }

                ctx.strokeStyle = '#4338ca';
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                nonEmptyStrokes.forEach(stroke => {
                    const renderPoints = stroke.closed
                        ? [...stroke.points, stroke.points[0]]
                        : stroke.points;
                    if (renderPoints.length < 2) return;
                    ctx.beginPath();
                    renderPoints.forEach((point, index) => {
                        if (index === 0) ctx.moveTo(sx(point.x), sy(point.y));
                        else ctx.lineTo(sx(point.x), sy(point.y));
                    });
                    ctx.stroke();
                });

                ctx.strokeStyle = '#94a3b8';
                ctx.lineWidth = 2;
                ctx.strokeRect(plotLeft, plotTop, actualWidth, actualHeight);

                const link = document.createElement('a');
                const safeFileName = safeArtworkTitle.replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, '_');
                link.download = `${safeFileName}_좌표작품.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const gridLines = [];
            for (let x = xMin; x <= xMax; x += 1) {
                if (x !== 0) {
                    gridLines.push(
                        <line key={`free-vx-${x}`} x1={x} y1={yMin} x2={x} y2={yMax} stroke="#c7cbd1" strokeWidth="0.035" />
                    );
                    if (x !== xMax) {
                        gridLines.push(
                            <text
                                key={`free-tx-${x}`}
                                x={x}
                                y="0.48"
                                fontSize="0.42"
                                fill="#374151"
                                textAnchor="middle"
                                transform="scale(1, -1)"
                            >
                                {x}
                            </text>
                        );
                    }
                }
            }

            for (let y = yMin; y <= yMax; y += 1) {
                if (y !== 0) {
                    gridLines.push(
                        <line key={`free-vy-${y}`} x1={xMin} y1={y} x2={xMax} y2={y} stroke="#c7cbd1" strokeWidth="0.035" />
                    );
                    if (y !== yMax) {
                        gridLines.push(
                            <text
                                key={`free-ty-${y}`}
                                x="-0.28"
                                y={-y + 0.14}
                                fontSize="0.42"
                                fill="#374151"
                                textAnchor="end"
                                transform="scale(1, -1)"
                            >
                                {y}
                            </text>
                        );
                    }
                }
            }

            const cursorClass = tool === 'pan'
                ? (isDragging ? 'cursor-grabbing' : 'cursor-grab')
                : tool === 'fill'
                    ? 'cursor-cell'
                    : tool === 'eraser'
                        ? 'cursor-not-allowed'
                        : 'cursor-crosshair';

            const renderNumberStepper = ({ pointId, axis, value, number }) => (
                <div className="h-8 w-[50px] inline-flex overflow-hidden rounded-md border border-slate-300 bg-white shadow-sm focus-within:border-emerald-500 focus-within:ring-1 focus-within:ring-emerald-200">
                    <input
                        type="text"
                        inputMode="numeric"
                        value={value}
                        onChange={event => updateAnswer(pointId, axis, event.target.value)}
                        onFocus={event => event.currentTarget.select()}
                        aria-label={`점 ${number}의 ${axis}좌표`}
                        className="w-[34px] min-w-0 bg-white text-center font-mono text-base font-bold text-slate-800 outline-none"
                    />
                    <div className="w-4 shrink-0 border-l border-slate-300 flex flex-col bg-slate-50">
                        <button
                            type="button"
                            onClick={() => stepAnswer(pointId, axis, 1)}
                            className="h-1/2 flex items-center justify-center text-[8px] leading-none font-black text-slate-600 hover:bg-emerald-100 active:bg-emerald-200 border-b border-slate-300 touch-manipulation"
                            aria-label={`${axis}좌표 1 증가`}
                        >
                            ▲
                        </button>
                        <button
                            type="button"
                            onClick={() => stepAnswer(pointId, axis, -1)}
                            className="h-1/2 flex items-center justify-center text-[8px] leading-none font-black text-slate-600 hover:bg-emerald-100 active:bg-emerald-200 touch-manipulation"
                            aria-label={`${axis}좌표 1 감소`}
                        >
                            ▼
                        </button>
                    </div>
                </div>
            );

            const renderColorAction = (action, index) => {
                if (action.type === 'fill') {
                    const rings = action.rings || (action.points ? [action.points] : []);
                    if (rings.length === 0) return null;
                    return (
                        <path
                            key={`free-color-fill-${index}`}
                            d={ringsToFreePath(rings)}
                            fill={action.color}
                            fillOpacity="0.76"
                            fillRule="evenodd"
                            clipRule="evenodd"
                        />
                    );
                }

                return (
                    <polyline
                        key={`free-color-stroke-${index}`}
                        points={strokePointsToString(action.points)}
                        fill="none"
                        stroke={action.color}
                        strokeWidth={action.width}
                        strokeOpacity={action.opacity ?? 0.78}
                        strokeLinecap="round"
                        strokeLinejoin="round"
                    />
                );
            };

            const renderCoordinatePlaneSvg = ({ interactive = false, showNumbers = true, showDots = true } = {}) => (
                <svg
                    ref={svgRef}
                    className={`w-full h-full ${interactive ? cursorClass : 'cursor-default'}`}
                    viewBox={`${xMin - 0.8} ${-yMax - 0.8} ${xMax - xMin + 1.6} ${yMax - yMin + 1.6}`}
                    preserveAspectRatio="xMidYMid meet"
                    style={{ touchAction: 'none', overscrollBehavior: 'contain' }}
                    onPointerDown={interactive ? handlePointerDown : undefined}
                    onPointerMove={interactive ? handlePointerMove : undefined}
                    onPointerUp={interactive ? handlePointerUp : undefined}
                    onPointerCancel={interactive ? handlePointerUp : undefined}
                >
                    <g transform={`translate(${pan.x} ${pan.y}) scale(${zoom})`}>
                        <g ref={mathGroupRef} transform="scale(1, -1)">
                            <rect x={xMin} y={yMin} width={xMax - xMin} height={yMax - yMin} fill="#ffffff" />

                            <g className="pointer-events-none">
                                {colorActions.map(renderColorAction)}
                                {currentColorStroke && renderColorAction(currentColorStroke, 'current')}
                            </g>

                            {gridLines}

                            <rect x={xMin} y={yMin} width={xMax - xMin} height={yMax - yMin} fill="none" stroke="#9ca3af" strokeWidth="0.08" />
                            <line x1={xMin} y1="0" x2={xMax - 0.35} y2="0" stroke="#111827" strokeWidth="0.08" strokeLinecap="round" />
                            <polygon points={`${xMax - 0.35},0.18 ${xMax - 0.35},-0.18 ${xMax},0`} fill="#111827" />
                            <text x={xMax - 0.12} y="0.55" fontSize="0.58" fill="#111827" fontStyle="italic" transform="scale(1, -1)">x</text>

                            <line x1="0" y1={yMin} x2="0" y2={yMax - 0.35} stroke="#111827" strokeWidth="0.08" strokeLinecap="round" />
                            <polygon points={`-0.18,${yMax - 0.35} 0.18,${yMax - 0.35} 0,${yMax}`} fill="#111827" />
                            <text x="-0.48" y={-(yMax - 0.18)} fontSize="0.58" fill="#111827" fontStyle="italic" transform="scale(1, -1)">y</text>
                            <text x="-0.28" y="0.52" fontSize="0.52" fill="#111827" fontStyle="italic" textAnchor="end" transform="scale(1, -1)">O</text>

                            {strokes.map(stroke => {
                                const renderPoints = stroke.closed && stroke.points.length >= 3
                                    ? [...stroke.points, stroke.points[0]]
                                    : stroke.points;
                                const isEditing = phase === 'drawing' && editingStrokeId === stroke.id;
                                return (
                                    <polyline
                                        key={`free-stroke-${stroke.id}`}
                                        points={renderPoints.map(point => `${point.x},${point.y}`).join(' ')}
                                        fill="none"
                                        stroke={isEditing ? '#f59e0b' : '#4338ca'}
                                        strokeWidth={isEditing ? '0.24' : '0.18'}
                                        strokeLinecap="round"
                                        strokeLinejoin="round"
                                    />
                                );
                            })}

                            {(showDots || showNumbers) && uniqueFlatPoints.map(point => {
                                const number = pointNumberById.get(point.id);
                                const isEditablePoint = interactive && phase === 'drawing' && tool === 'draw' && editingStrokeId === point.strokeId;
                                return (
                                    <g key={`free-point-${point.id}`}>
                                        {isEditablePoint && (
                                            <circle
                                                cx={point.x}
                                                cy={point.y}
                                                r="0.48"
                                                fill="transparent"
                                                stroke="#f59e0b"
                                                strokeWidth="0.08"
                                                className="cursor-move"
                                                onPointerDown={event => startPointDrag(event, point)}
                                            />
                                        )}
                                        {showDots && (
                                            <circle cx={point.x} cy={point.y} r={isEditablePoint ? '0.18' : '0.14'} fill={isEditablePoint ? '#f59e0b' : '#ef4444'} stroke="#ffffff" strokeWidth="0.05" className="pointer-events-none" />
                                        )}
                                        {showNumbers && (
                                            <>
                                                <circle cx={point.x + 0.36} cy={point.y + 0.42} r="0.30" fill="#ffffff" stroke={isEditablePoint ? '#f59e0b' : '#4338ca'} strokeWidth="0.06" className="pointer-events-none" />
                                                <text
                                                    x={point.x + 0.36}
                                                    y={-(point.y + 0.42) + 0.11}
                                                    fontSize="0.30"
                                                    fill={isEditablePoint ? '#b45309' : '#3730a3'}
                                                    fontWeight="700"
                                                    textAnchor="middle"
                                                    transform="scale(1, -1)"
                                                    className="pointer-events-none"
                                                >
                                                    {number}
                                                </text>
                                            </>
                                        )}
                                    </g>
                                );
                            })}
                        </g>
                    </g>
                </svg>
            );

            const renderCanvasControls = () => (
                <div className="absolute top-3 right-3 z-30 flex flex-col gap-2">
                    <div className="bg-white rounded-xl shadow-md border border-slate-200 p-1 flex flex-col gap-1">
                        {phase === 'drawing' ? (
                            <button
                                onClick={() => setTool('draw')}
                                className={`p-2.5 rounded-lg transition-colors ${tool === 'draw' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-100'}`}
                                title="점 찍기·점 이동"
                            >
                                <i className="ph-bold ph-pencil-simple text-xl"></i>
                            </button>
                        ) : (
                            <>
                                <button onClick={() => setTool('fill')} className={`p-2.5 rounded-lg transition-colors ${tool === 'fill' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-100'}`} title="영역 채우기">
                                    <i className="ph-fill ph-paint-bucket text-xl"></i>
                                </button>
                                <button onClick={() => setTool('brush')} className={`p-2.5 rounded-lg transition-colors ${tool === 'brush' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-100'}`} title="붓칠">
                                    <i className="ph-bold ph-paint-brush text-xl"></i>
                                </button>
                                <button onClick={() => setTool('eraser')} className={`p-2.5 rounded-lg transition-colors ${tool === 'eraser' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-100'}`} title="색칠 지우개">
                                    <i className="ph-bold ph-eraser text-xl"></i>
                                </button>
                            </>
                        )}

                        <button
                            onClick={() => setTool('pan')}
                            className={`p-2.5 rounded-lg transition-colors ${tool === 'pan' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-500 hover:bg-slate-100'}`}
                            title="화면 이동"
                        >
                            <i className="ph-bold ph-hand-grabbing text-xl"></i>
                        </button>
                    </div>

                    <div className="bg-white rounded-xl shadow-md border border-slate-200 p-1 flex flex-col gap-1">
                        <button onClick={() => setZoom(previous => Math.min(previous * 1.2, 4))} className="p-2.5 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors" title="확대">
                            <i className="ph-bold ph-magnifying-glass-plus text-xl"></i>
                        </button>
                        <button onClick={() => setZoom(previous => Math.max(previous / 1.2, 0.5))} className="p-2.5 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors" title="축소">
                            <i className="ph-bold ph-magnifying-glass-minus text-xl"></i>
                        </button>
                        <button onClick={resetView} className="p-2.5 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors" title="화면 맞춤">
                            <i className="ph-bold ph-corners-out text-xl"></i>
                        </button>
                    </div>
                </div>
            );

            const renderColorToolbar = () => (
                <div className="absolute top-3 left-3 z-30 max-w-[calc(100%_-_95px)] bg-white/95 border border-slate-200 rounded-xl shadow-md p-2.5 flex flex-wrap items-center gap-2">
                    <span className="text-xs font-bold text-slate-700 mr-1">3단계 색칠</span>
                    <div className="flex flex-wrap gap-1">
                        {COLOR_PALETTE.map(color => (
                            <button
                                key={color}
                                onClick={() => setSelectedColor(color)}
                                className={`w-7 h-7 rounded-full border-2 shadow-sm ${selectedColor === color ? 'border-indigo-600 ring-2 ring-indigo-200' : 'border-white'}`}
                                style={{ backgroundColor: color }}
                                title="색 선택"
                            />
                        ))}
                    </div>
                    <label className="flex items-center gap-1.5 text-[11px] font-semibold text-slate-600">
                        붓
                        <input
                            type="range"
                            min="0.45"
                            max="2.4"
                            step="0.15"
                            value={brushSize}
                            onChange={event => setBrushSize(Number(event.target.value))}
                            className="w-20"
                        />
                    </label>
                    <button onClick={undoColorAction} disabled={colorActions.length === 0} className="px-2.5 py-1.5 rounded-lg border border-slate-300 text-slate-700 text-xs font-bold hover:bg-slate-50 disabled:opacity-40">
                        <i className="ph-bold ph-arrow-counter-clockwise mr-1"></i>색칠 취소
                    </button>
