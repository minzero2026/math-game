        const GUIDED_ACTIVE_THEME_STORAGE_KEY = 'coordinate-picture-active-theme-v1';

        const readGuidedProgressMap = () => {
            try {
                const saved = sessionStorage.getItem(GUIDED_PROGRESS_STORAGE_KEY);
                return saved ? JSON.parse(saved) : {};
            } catch (error) {
                console.warn('좌표 그림 진행 상태를 불러오지 못했습니다.', error);
                return {};
            }
        };

        const writeGuidedProgressMap = (progressMap) => {
            try {
                sessionStorage.setItem(GUIDED_PROGRESS_STORAGE_KEY, JSON.stringify(progressMap));
            } catch (error) {
                console.warn('좌표 그림 진행 상태를 저장하지 못했습니다.', error);
            }
        };

        const readGuidedActiveThemeId = () => {
            try {
                const savedThemeId = sessionStorage.getItem(GUIDED_ACTIVE_THEME_STORAGE_KEY);
                return savedThemeId && THEMES[savedThemeId] ? savedThemeId : 'cat';
            } catch (error) {
                return 'cat';
            }
        };

        const writeGuidedActiveThemeId = (themeId) => {
            try {
                sessionStorage.setItem(GUIDED_ACTIVE_THEME_STORAGE_KEY, themeId);
            } catch (error) {
                console.warn('선택한 좌표 그림을 저장하지 못했습니다.', error);

            const [activeThemeId, setActiveThemeId] = useState(initialThemeId);
            const theme = THEMES[activeThemeId];

            // 그리기 진행 상태
            const [currentShapeIdx, setCurrentShapeIdx] = useState(initialProgress.currentShapeIdx);
            const [targetPointIdx, setTargetPointIdx] = useState(initialProgress.targetPointIdx);
            const [drawnShapes, setDrawnShapes] = useState(initialProgress.drawnShapes);
            const [currentLine, setCurrentLine] = useState(initialProgress.currentLine);
            const [isComplete, setIsComplete] = useState(initialProgress.isComplete);

            // 완성 후 색칠 상태: 영역 채우기와 붓칠을 같은 작업 이력으로 관리
            const [colorActions, setColorActions] = useState(initialProgress.colorActions);
            const [undoStepsUsed, setUndoStepsUsed] = useState(initialProgress.undoStepsUsed);
            const [currentColorStroke, setCurrentColorStroke] = useState(null);
            const [selectedColor, setSelectedColor] = useState(initialProgress.selectedColor);
            const [brushSize, setBrushSize] = useState(initialProgress.brushSize);
            const [guidedArtworkTitle, setGuidedArtworkTitle] = useState(initialProgress.guidedArtworkTitle);
            const [guidedStudentInfo, setGuidedStudentInfo] = useState(initialProgress.guidedStudentInfo);
            const canvasSvgRef = useRef(null);

            // 교사모드
            const [showTeacherMode, setShowTeacherMode] = useState(false);

            // 툴 및 화면 제어 상태
            // draw: 좌표 찍기 / fill: 영역 채우기 / brush: 붓칠 / eraser: 지우개 / pan: 화면 이동
            const [tool, setTool] = useState(initialProgress.tool);
            const [zoom, setZoom] = useState(initialProgress.zoom);
            const [pan, setPan] = useState(initialProgress.pan);

            // 좌표 관련 유틸
            const currentShape = theme.shapes[currentShapeIdx];
            const targetPoint = currentShape ? currentShape[targetPointIdx] : null;

            const totalPoints = theme.shapes.reduce((acc, shape) => acc + shape.length, 0);
            const completedPoints = drawnShapes.reduce((acc, shape) => acc + shape.length, 0) + currentLine.length;
            const progress = Math.round((completedPoints / totalPoints) * 100);

            const COLOR_PALETTE = [
                '#ef4444', '#f97316', '#facc15', '#22c55e',
                '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899',
                '#92400e', '#111827'
            ];

            const getPointCount = (targetTheme) =>
                targetTheme.shapes.reduce((sum, shape) => sum + shape.length, 0);

            const pointsAreSame = (a, b) =>
                !!a && !!b && Math.abs(a[0] - b[0]) < 1e-7 && Math.abs(a[1] - b[1]) < 1e-7;

            const isClosedShape = (shape) =>
                Array.isArray(shape) && shape.length >= 4 && pointsAreSame(shape[0], shape[shape.length - 1]);

            const GEOMETRY_EPSILON = 1e-7;

            const pointKey = (point) => {
                const x = Math.round(point[0] * 1000000) / 1000000;
                const y = Math.round(point[1] * 1000000) / 1000000;
                return `${x},${y}`;
            };

            const subtractPoints = (a, b) => [a[0] - b[0], a[1] - b[1]];
            const crossProduct = (a, b) => a[0] * b[1] - a[1] * b[0];

            const pointOnSegment = (point, start, end) => {
                const cross = crossProduct(subtractPoints(point, start), subtractPoints(end, start));
                if (Math.abs(cross) > GEOMETRY_EPSILON) return false;

                return point[0] >= Math.min(start[0], end[0]) - GEOMETRY_EPSILON &&
                    point[0] <= Math.max(start[0], end[0]) + GEOMETRY_EPSILON &&
                    point[1] >= Math.min(start[1], end[1]) - GEOMETRY_EPSILON &&
                    point[1] <= Math.max(start[1], end[1]) + GEOMETRY_EPSILON;
            };

            // 두 선분의 교점과 T자 모양 접점을 모두 구합니다.
            const getSegmentIntersections = (a, b, c, d) => {
                const r = subtractPoints(b, a);
                const s = subtractPoints(d, c);
                const rCrossS = crossProduct(r, s);
                const cMinusA = subtractPoints(c, a);
                const cMinusACrossR = crossProduct(cMinusA, r);

                if (Math.abs(rCrossS) > GEOMETRY_EPSILON) {
                    const t = crossProduct(cMinusA, s) / rCrossS;
                    const u = crossProduct(cMinusA, r) / rCrossS;
                    if (t >= -GEOMETRY_EPSILON && t <= 1 + GEOMETRY_EPSILON &&
                        u >= -GEOMETRY_EPSILON && u <= 1 + GEOMETRY_EPSILON) {
                        return [[a[0] + t * r[0], a[1] + t * r[1]]];
                    }
                    return [];
                }

                if (Math.abs(cMinusACrossR) > GEOMETRY_EPSILON) return [];

                const candidates = [a, b, c, d].filter(point =>
                    pointOnSegment(point, a, b) && pointOnSegment(point, c, d)
                );
                return candidates.filter((point, index) =>
                    candidates.findIndex(other => pointsAreSame(point, other)) === index
                );
            };

            const signedPolygonArea = (ring) => {
                let area = 0;
                for (let i = 0; i < ring.length - 1; i += 1) {
                    area += ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
                }
                return area / 2;
            };

            const polygonArea = (ring) => Math.abs(signedPolygonArea(ring));

            const pointInPolygon = (point, ring) => {
                const x = point.x ?? point[0];
                const y = point.y ?? point[1];
                let inside = false;

                for (let i = 0, j = ring.length - 2; i < ring.length - 1; j = i++) {
                    const xi = ring[i][0];
                    const yi = ring[i][1];
                    const xj = ring[j][0];
                    const yj = ring[j][1];

                    const crosses = ((yi > y) !== (yj > y)) &&
                        (x < ((xj - xi) * (y - yi)) / ((yj - yi) || Number.EPSILON) + xi);
                    if (crosses) inside = !inside;
                }
                return inside;
            };

            const findInteriorPoint = (ring) => {
                const area = signedPolygonArea(ring);
                if (Math.abs(area) > GEOMETRY_EPSILON) {
                    let cx = 0;
                    let cy = 0;
                    for (let i = 0; i < ring.length - 1; i += 1) {
                        const factor = ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
                        cx += (ring[i][0] + ring[i + 1][0]) * factor;
                        cy += (ring[i][1] + ring[i + 1][1]) * factor;
                    }
                    const centroid = [cx / (6 * area), cy / (6 * area)];
                    if (pointInPolygon(centroid, ring)) return centroid;
                }

                const xs = ring.slice(0, -1).map(point => point[0]);
                const ys = ring.slice(0, -1).map(point => point[1]);
                const minX = Math.min(...xs);
                const maxX = Math.max(...xs);
                const minY = Math.min(...ys);
                const maxY = Math.max(...ys);

                for (let row = 1; row < 20; row += 1) {
                    for (let col = 1; col < 20; col += 1) {
                        const sample = [
                            minX + ((maxX - minX) * col) / 20,
                            minY + ((maxY - minY) * row) / 20
                        ];
                        if (pointInPolygon(sample, ring)) return sample;
                    }
                }

                return ring[0];
            };

            const normalizeCycleKey = (ring) => {
                const keys = ring.slice(0, -1).map(pointKey);
                let best = null;
                for (let start = 0; start < keys.length; start += 1) {
                    const candidate = keys.slice(start).concat(keys.slice(0, start)).join(';');
                    if (best === null || candidate < best) best = candidate;
                }
                return best || '';
            };

            // 모든 선분을 하나의 평면 그래프로 만든 뒤, 선으로 둘러싸인 각각의 면을 자동으로 찾습니다.
            // 따라서 왕관뿐 아니라 내부 선으로 나뉜 모든 그림이 부분별로 따로 채워집니다.
            const buildFillRegions = (targetTheme) => {
                const segments = [];

                targetTheme.shapes.forEach((shape, shapeIndex) => {
                    for (let index = 0; index < shape.length - 1; index += 1) {
                        const start = shape[index];
                        const end = shape[index + 1];
                        if (!pointsAreSame(start, end)) {
                            segments.push({
                                start,
                                end,
                                shapeIndex,
                                splitPoints: [start, end]
                            });
                        }
                    }
                });

                for (let i = 0; i < segments.length; i += 1) {
                    for (let j = i + 1; j < segments.length; j += 1) {
                        const intersections = getSegmentIntersections(
                            segments[i].start,
                            segments[i].end,
                            segments[j].start,
                            segments[j].end
                        );
                        intersections.forEach(point => {
                            segments[i].splitPoints.push(point);
                            segments[j].splitPoints.push(point);
                        });
                    }
                }

                const nodes = new Map();
                const edges = new Map();

                const addNode = (point) => {
                    const key = pointKey(point);
                    if (!nodes.has(key)) {
                        nodes.set(key, [
                            Math.round(point[0] * 1000000) / 1000000,
                            Math.round(point[1] * 1000000) / 1000000
                        ]);
                    }
                    return key;
                };

                segments.forEach(segment => {
                    const dx = segment.end[0] - segment.start[0];
                    const dy = segment.end[1] - segment.start[1];
                    const denominator = dx * dx + dy * dy || 1;
                    const uniquePoints = segment.splitPoints.filter((point, index, list) =>
                        list.findIndex(other => pointsAreSame(point, other)) === index
                    );

                    uniquePoints.sort((a, b) => {
                        const ta = ((a[0] - segment.start[0]) * dx + (a[1] - segment.start[1]) * dy) / denominator;
                        const tb = ((b[0] - segment.start[0]) * dx + (b[1] - segment.start[1]) * dy) / denominator;
                        return ta - tb;
                    });

                    for (let index = 0; index < uniquePoints.length - 1; index += 1) {
                        const startKey = addNode(uniquePoints[index]);
                        const endKey = addNode(uniquePoints[index + 1]);
                        if (startKey === endKey) continue;
                        const edgeKey = startKey < endKey
                            ? `${startKey}|${endKey}`
                            : `${endKey}|${startKey}`;
                        edges.set(edgeKey, [startKey, endKey]);
                    }
                });

                const adjacency = new Map();
                edges.forEach(([startKey, endKey]) => {
                    if (!adjacency.has(startKey)) adjacency.set(startKey, []);
                    if (!adjacency.has(endKey)) adjacency.set(endKey, []);
                    adjacency.get(startKey).push(endKey);
                    adjacency.get(endKey).push(startKey);
                });

                adjacency.forEach((neighbors, nodeKey) => {
                    const node = nodes.get(nodeKey);
                    neighbors.sort((aKey, bKey) => {
                        const a = nodes.get(aKey);
                        const b = nodes.get(bKey);
                        return Math.atan2(a[1] - node[1], a[0] - node[0]) -
                            Math.atan2(b[1] - node[1], b[0] - node[0]);
                    });
                });

                const visitedHalfEdges = new Set();
                const cycles = [];
                const maximumSteps = edges.size * 3 + 20;

                edges.forEach(([edgeStart, edgeEnd]) => {
                    [[edgeStart, edgeEnd], [edgeEnd, edgeStart]].forEach(([startFrom, startTo]) => {
                        const firstHalfEdge = `${startFrom}>${startTo}`;
                        if (visitedHalfEdges.has(firstHalfEdge)) return;

                        let from = startFrom;
                        let to = startTo;
                        const ring = [];
                        let closed = false;

                        for (let step = 0; step < maximumSteps; step += 1) {
                            const halfEdgeKey = `${from}>${to}`;
                            if (visitedHalfEdges.has(halfEdgeKey) && !(from === startFrom && to === startTo && step > 0)) {
                                break;
                            }

                            visitedHalfEdges.add(halfEdgeKey);
                            ring.push(nodes.get(from));

                            const neighbors = adjacency.get(to) || [];
                            const reverseIndex = neighbors.indexOf(from);
                            if (reverseIndex < 0 || neighbors.length === 0) break;

                            // 들어온 방향의 바로 시계방향 선분을 선택하면 같은 면의 경계를 따라갑니다.
                            const next = neighbors[(reverseIndex - 1 + neighbors.length) % neighbors.length];
                            from = to;
                            to = next;

                            if (from === startFrom && to === startTo) {
                                closed = true;
                                break;
                            }
                        }

                        if (closed && ring.length >= 3) {
                            ring.push(ring[0]);
                            const signedArea = signedPolygonArea(ring);
                            if (signedArea > GEOMETRY_EPSILON) {
                                cycles.push({ ring, area: signedArea });
                            }
                        }
                    });
                });

                const uniqueCycles = [];
                const cycleKeys = new Set();
                cycles.forEach(cycle => {
                    const key = normalizeCycleKey(cycle.ring);
                    if (!cycleKeys.has(key)) {
                        cycleKeys.add(key);
                        uniqueCycles.push(cycle);
                    }
                });

                // 서로 떨어진 작은 닫힌 곡선은 바깥 영역의 구멍으로 처리합니다.
                uniqueCycles.forEach((cycle, cycleIndex) => {
                    const samplePoint = findInteriorPoint(cycle.ring);
                    let parentIndex = -1;
                    let parentArea = Infinity;

                    uniqueCycles.forEach((candidate, candidateIndex) => {
                        if (candidateIndex === cycleIndex || candidate.area <= cycle.area + GEOMETRY_EPSILON) return;
                        if (pointInPolygon(samplePoint, candidate.ring) && candidate.area < parentArea) {
                            parentIndex = candidateIndex;
                            parentArea = candidate.area;
                        }
                    });

                    cycle.parentIndex = parentIndex;
                    cycle.children = [];
                });

                uniqueCycles.forEach((cycle, cycleIndex) => {
                    if (cycle.parentIndex >= 0) {
                        uniqueCycles[cycle.parentIndex].children.push(cycleIndex);
                    }
                });

                return uniqueCycles.map((cycle, regionIndex) => ({
                    id: `region-${regionIndex}`,
                    rings: [
                        cycle.ring,
                        ...cycle.children.map(childIndex => uniqueCycles[childIndex].ring)
                    ],
                    area: cycle.area
                }));
            };

            const fillRegions = useMemo(() => buildFillRegions(theme), [theme]);

            const pointInFillRegion = (point, region) => {
                if (!region || !region.rings || region.rings.length === 0) return false;
                if (!pointInPolygon(point, region.rings[0])) return false;
                return !region.rings.slice(1).some(hole => pointInPolygon(point, hole));
            };

            const findFillRegionAt = (point) => {
                const candidates = fillRegions
                    .filter(region => pointInFillRegion(point, region))
                    .sort((a, b) => a.area - b.area);
                return candidates.length > 0 ? candidates[0] : null;
            };

            const ringsToPath = (rings) => (rings || []).map(ring => {
                if (!ring || ring.length === 0) return '';
                return `M ${ring.map(point => `${point[0]} ${point[1]}`).join(' L ')} Z`;
            }).join(' ');

            const strokePointsToString = (points) => {
                if (!points || points.length === 0) return '';
                const normalized = points.length === 1 ? [points[0], points[0]] : points;
                return normalized.map(point => `${point[0]},${point[1]}`).join(' ');
            };

            const addColorAction = (action) => {
                setColorActions(previous => [...previous, action]);
                setUndoStepsUsed(0);
            };

            const undoColorAction = () => {
                if (colorActions.length === 0 || undoStepsUsed >= 5) return;
                setColorActions(previous => previous.slice(0, -1));
                setCurrentColorStroke(null);
                setUndoStepsUsed(previous => Math.min(5, previous + 1));
            };

            const clearColoring = () => {
                setColorActions([]);
                setUndoStepsUsed(0);
                setCurrentColorStroke(null);
                setUndoStepsUsed(0);
            };

            const saveArtwork = () => {
                if (!isComplete) return;

                const canvasWidth = 1400;
                const pairsPerRow = 7;
                const safeArtworkTitle = guidedArtworkTitle.trim() || theme.name.split('(')[0].trim() || '나의 좌표 그림';
                const safeStudentInfo = guidedStudentInfo.trim();
                const xMin = theme.xRange[0];
                const xMax = theme.xRange[1];
                const yMin = theme.yRange[0];
                const yMax = theme.yRange[1];

                const coordinateKey = (point) => {
                    const x = Math.round(point[0] * 1000000) / 1000000;
                    const y = Math.round(point[1] * 1000000) / 1000000;
                    return `${x},${y}`;
                };

                const numberByCoordinate = new Map();
                const shownCoordinates = new Set();
                let nextNumber = 1;

                const shapeSummaries = theme.shapes.map(shape => {
                    const pathPoints = isClosedShape(shape) ? shape.slice(0, -1) : shape;
                    const points = [];

                    pathPoints.forEach(point => {
                        const key = coordinateKey(point);
                        if (!numberByCoordinate.has(key)) {
                            numberByCoordinate.set(key, nextNumber);
                            nextNumber += 1;
                        }
                        if (!shownCoordinates.has(key)) {
                            shownCoordinates.add(key);
                            points.push({
                                number: numberByCoordinate.get(key),
                                x: point[0],
                                y: point[1]
                            });
                        }
                    });

                    return { points };
                });

                const coordinateSectionHeight = shapeSummaries.reduce((sum, shape) =>
                    sum + 34 + Math.max(1, Math.ceil(shape.points.length / pairsPerRow)) * 58 + 24, 0
                );
                const headingY = safeStudentInfo ? 112 : 72;
                const pairStartY = headingY + 60;
                const topHeight = Math.max(300, pairStartY + coordinateSectionHeight + 20);
                const graphHeight = 1200;

                const canvas = document.createElement('canvas');
                canvas.width = canvasWidth;
                canvas.height = topHeight + graphHeight;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#0f172a';
                ctx.font = '700 46px Arial, sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'alphabetic';
                ctx.fillText(safeArtworkTitle, 60, 72);

                if (safeStudentInfo) {
                    ctx.fillStyle = '#334155';
                    ctx.font = '700 26px Arial, sans-serif';
                    ctx.fillText(safeStudentInfo, 60, 112);
                }

                let pairY = pairStartY;
                shapeSummaries.forEach((shape, shapeIndex) => {
                    ctx.fillStyle = '#334155';
                    ctx.font = '700 23px Arial, sans-serif';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'alphabetic';
                    ctx.fillText(`Shape ${shapeIndex + 1}`, 60, pairY);
                    pairY += 34;

                    shape.points.forEach((point, index) => {
                        const column = index % pairsPerRow;
                        const row = Math.floor(index / pairsPerRow);
                        const cardX = 60 + column * 185;
                        const cardY = pairY + row * 58;

                        ctx.fillStyle = '#eef2ff';
                        ctx.strokeStyle = '#c7d2fe';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.roundRect(cardX, cardY, 165, 42, 10);
                        ctx.fill();
                        ctx.stroke();

                        ctx.fillStyle = '#4f46e5';
                        ctx.beginPath();
                        ctx.arc(cardX + 23, cardY + 21, 14, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = '#ffffff';
                        ctx.font = '700 16px Arial, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(String(point.number), cardX + 23, cardY + 21);

                        ctx.fillStyle = '#1e293b';
                        ctx.font = '700 19px Arial, sans-serif';
                        ctx.textAlign = 'left';
                        ctx.fillText(`(${point.x}, ${point.y})`, cardX + 47, cardY + 21);
                    });

                    pairY += Math.max(1, Math.ceil(shape.points.length / pairsPerRow)) * 58 + 24;
                });

                const graphTop = topHeight;
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(0, graphTop, canvasWidth, graphHeight);

                const marginX = 95;
                const marginTop = 45;
                const marginBottom = 70;
                const plotWidth = canvasWidth - marginX * 2;
                const plotHeight = graphHeight - marginTop - marginBottom;
                const scale = Math.min(plotWidth / (xMax - xMin), plotHeight / (yMax - yMin));
                const actualWidth = (xMax - xMin) * scale;
                const actualHeight = (yMax - yMin) * scale;
                const plotLeft = (canvasWidth - actualWidth) / 2;
                const plotTop = graphTop + marginTop + (plotHeight - actualHeight) / 2;
                const sx = x => plotLeft + (x - xMin) * scale;
                const sy = y => plotTop + (yMax - y) * scale;

                ctx.fillStyle = '#ffffff';
                ctx.fillRect(plotLeft, plotTop, actualWidth, actualHeight);

                colorActions.forEach(action => {
                    if (action.type === 'fill') {
                        const rings = action.rings || (action.points ? [action.points] : []);
                        if (rings.length === 0) return;
                        ctx.beginPath();
                        rings.forEach(ring => {
                            if (!ring || ring.length < 3) return;
                            ring.forEach((point, index) => {
                                const px = sx(point[0]);
                                const py = sy(point[1]);
                                if (index === 0) ctx.moveTo(px, py);
                                else ctx.lineTo(px, py);
                            });
                            ctx.closePath();
                        });
                        ctx.globalAlpha = 0.76;
                        ctx.fillStyle = action.color;
                        ctx.fill('evenodd');
                        ctx.globalAlpha = 1;
                    } else {
                        if (!action.points || action.points.length === 0) return;
                        ctx.beginPath();
                        action.points.forEach((point, index) => {
                            const px = sx(point[0]);
                            const py = sy(point[1]);
                            if (index === 0) ctx.moveTo(px, py);
                            else ctx.lineTo(px, py);
                        });
                        if (action.points.length === 1) {
                            ctx.lineTo(sx(action.points[0][0]) + 0.01, sy(action.points[0][1]));
                        }
                        ctx.strokeStyle = action.color;
                        ctx.lineWidth = action.width * scale;
                        ctx.globalAlpha = action.opacity ?? (action.type === 'erase' ? 1 : 0.76);
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                });

                ctx.strokeStyle = '#d6dde8';
                ctx.lineWidth = 1;
                for (let x = xMin; x <= xMax; x += 1) {
                    ctx.beginPath();
                    ctx.moveTo(sx(x), sy(yMin));
                    ctx.lineTo(sx(x), sy(yMax));
                    ctx.stroke();
                }
                for (let y = yMin; y <= yMax; y += 1) {
                    ctx.beginPath();
                    ctx.moveTo(sx(xMin), sy(y));
                    ctx.lineTo(sx(xMax), sy(y));
                    ctx.stroke();
                }

                ctx.strokeStyle = '#111827';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(sx(xMin), sy(0));
                ctx.lineTo(sx(xMax), sy(0));
                ctx.moveTo(sx(0), sy(yMin));
                ctx.lineTo(sx(0), sy(yMax));
                ctx.stroke();

                ctx.fillStyle = '#475569';
                ctx.font = '15px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                for (let x = xMin; x <= xMax; x += 1) {
                    if (x !== 0 && x !== xMax) ctx.fillText(String(x), sx(x), sy(0) + 7);
                }
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                for (let y = yMin; y <= yMax; y += 1) {
                    if (y !== 0 && y !== yMax) ctx.fillText(String(y), sx(0) - 7, sy(y));
                }

                ctx.strokeStyle = '#1e1b4b';
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                theme.shapes.forEach(shape => {
                    if (shape.length < 2) return;
                    ctx.beginPath();
                    shape.forEach((point, index) => {
                        if (index === 0) ctx.moveTo(sx(point[0]), sy(point[1]));
                        else ctx.lineTo(sx(point[0]), sy(point[1]));
                    });
                    ctx.stroke();
                });

                ctx.strokeStyle = '#94a3b8';
                ctx.lineWidth = 2;
                ctx.strokeRect(plotLeft, plotTop, actualWidth, actualHeight);

                const link = document.createElement('a');
                const safeFileName = safeArtworkTitle.replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, '_');
                link.download = `${safeFileName}_좌표작품.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const resetDrawing = () => {
                setCurrentShapeIdx(0);
                setTargetPointIdx(0);
                setDrawnShapes([]);
                setCurrentLine([]);
                setIsComplete(false);
                setColorActions([]);
                setUndoStepsUsed(0);
                setCurrentColorStroke(null);
                setSelectedColor('#f97316');
                setBrushSize(1.2);
                setGuidedArtworkTitle('');
                setGuidedStudentInfo('');
                setZoom(1);
                setPan({ x: 0, y: 0 });
                setTool('draw');
            };

            const getCurrentGuidedProgress = () => ({
                currentShapeIdx,
                targetPointIdx,
                drawnShapes,
                currentLine,
                isComplete,
                colorActions,
                undoStepsUsed,
                selectedColor,
                brushSize,
                guidedArtworkTitle,
                guidedStudentInfo,
                tool,
                zoom,
                pan
            });

            const saveGuidedProgress = (themeId, progress = getCurrentGuidedProgress()) => {
                const progressMap = readGuidedProgressMap();
                progressMap[themeId] = progress;
                writeGuidedProgressMap(progressMap);
            };

            const applyGuidedProgress = (progress) => {
                const next = { ...createEmptyGuidedProgress(), ...(progress || {}) };
                setCurrentShapeIdx(next.currentShapeIdx);
                setTargetPointIdx(next.targetPointIdx);
                setDrawnShapes(Array.isArray(next.drawnShapes) ? next.drawnShapes : []);
                setCurrentLine(Array.isArray(next.currentLine) ? next.currentLine : []);
                setIsComplete(Boolean(next.isComplete));
                setColorActions(Array.isArray(next.colorActions) ? next.colorActions : []);
                setUndoStepsUsed(Number.isFinite(next.undoStepsUsed) ? next.undoStepsUsed : 0);
                setCurrentColorStroke(null);
                setSelectedColor(next.selectedColor || '#f97316');
                setBrushSize(Number.isFinite(next.brushSize) ? next.brushSize : 1.2);
                setGuidedArtworkTitle(next.guidedArtworkTitle || '');
                setGuidedStudentInfo(next.guidedStudentInfo || '');
                setTool(next.tool || 'draw');
                setZoom(Number.isFinite(next.zoom) ? next.zoom : 1);
                setPan(next.pan && Number.isFinite(next.pan.x) && Number.isFinite(next.pan.y)
                    ? next.pan
                    : { x: 0, y: 0 });
            };

            const handleThemeChange = (e) => {
                const nextThemeId = e.target.value;
                if (nextThemeId === activeThemeId) return;

                // 현재 그림의 진행 상태를 먼저 저장한 뒤, 선택한 그림의 상태를 복원합니다.
                saveGuidedProgress(activeThemeId);
                const progressMap = readGuidedProgressMap();
                writeGuidedActiveThemeId(nextThemeId);
                setActiveThemeId(nextThemeId);
                applyGuidedProgress(progressMap[nextThemeId]);
            };

            // 점 찍기·색칠·이름 입력 등 상태가 바뀔 때마다 현재 그림에 자동 저장합니다.
            useEffect(() => {
                saveGuidedProgress(activeThemeId);
            }, [
                activeThemeId, currentShapeIdx, targetPointIdx, drawnShapes, currentLine,
                isComplete, colorActions, undoStepsUsed, selectedColor, brushSize,
                guidedArtworkTitle, guidedStudentInfo, tool, zoom, pan
            ]);

            // 점 클릭 (그리기) 로직
            const handlePointClick = (x, y) => {
                if (isComplete || tool !== 'draw') return;

                if (targetPoint && x === targetPoint[0] && y === targetPoint[1]) {
                    const newLine = [...currentLine, [x, y]];

                    if (newLine.length === currentShape.length) {
                        const newShapes = [...drawnShapes, newLine];
                        setDrawnShapes(newShapes);
                        setCurrentLine([]);

                        if (currentShapeIdx + 1 < theme.shapes.length) {
                            setCurrentShapeIdx(currentShapeIdx + 1);
                            setTargetPointIdx(0);
                        } else {
                            setIsComplete(true);
                            setTool('fill');
                        }
                    } else {
                        setCurrentLine(newLine);
                        setTargetPointIdx(targetPointIdx + 1);
                    }
                }
            };

            const TeacherPreviewSvg = ({ colored }) => {
                const xMin = theme.xRange[0];
                const xMax = theme.xRange[1];
                const yMin = theme.yRange[0];
                const yMax = theme.yRange[1];
                const answerColors = TEACHER_ANSWER_COLORS[theme.id] || COLOR_PALETTE;

                const previewGrid = [];
                for (let x = xMin; x <= xMax; x += 1) {
                    if (x !== 0) {
                        previewGrid.push(
                            <line key={`pvx-${x}`} x1={x} y1={yMin} x2={x} y2={yMax} stroke="#d7dce3" strokeWidth="0.035" />
                        );
                    }
                }
                for (let y = yMin; y <= yMax; y += 1) {
                    if (y !== 0) {
                        previewGrid.push(
                            <line key={`pvy-${y}`} x1={xMin} y1={y} x2={xMax} y2={y} stroke="#d7dce3" strokeWidth="0.035" />
                        );
                    }
                }

                return (
                    <svg
                        className="w-full h-full bg-white rounded-lg"
                        viewBox={`${xMin - 0.8} ${-yMax - 0.8} ${xMax - xMin + 1.6} ${yMax - yMin + 1.6}`}
                        preserveAspectRatio="xMidYMid meet"
                    >
                        <g transform="scale(1, -1)">
                            <rect x={xMin} y={yMin} width={xMax - xMin} height={yMax - yMin} fill="#ffffff" />

                            {colored && (
                                <>
                                    {fillRegions.map((region, i) => (
                                        <path
                                            key={`teacher-fill-region-${i}`}
                                            d={ringsToPath(region.rings)}
                                            fill={answerColors[i % answerColors.length] || '#94a3b8'}
                                            fillOpacity="0.78"
                                            fillRule="evenodd"
                                            clipRule="evenodd"
                                        />
                                    ))}
                                    {theme.shapes.map((shape, i) => !isClosedShape(shape) && (
                                        <polyline
                                            key={`teacher-open-brush-${i}`}
                                            points={strokePointsToString(shape)}
                                            fill="none"
                                            stroke={answerColors[i % answerColors.length] || '#94a3b8'}
                                            strokeWidth="0.75"
                                            strokeOpacity="0.48"
                                            strokeLinecap="round"
                                            strokeLinejoin="round"
                                        />
                                    ))}
                                </>
                            )}

                            {previewGrid}
                            <line x1={xMin} y1="0" x2={xMax} y2="0" stroke="#334155" strokeWidth="0.08" />
                            <line x1="0" y1={yMin} x2="0" y2={yMax} stroke="#334155" strokeWidth="0.08" />
                            <rect x={xMin} y={yMin} width={xMax - xMin} height={yMax - yMin} fill="none" stroke="#94a3b8" strokeWidth="0.08" />

                            {theme.shapes.map((shape, i) => (
                                <polyline
                                    key={`teacher-line-${i}`}
                                    points={shape.map(p => `${p[0]},${p[1]}`).join(' ')}
                                    fill="none"
                                    stroke="#111827"
                                    strokeWidth="0.16"
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                />
                            ))}
                        </g>
                    </svg>
                );
            };

            const SvgCanvas = () => {
                const svgRef = canvasSvgRef;
                const mathGroupRef = useRef(null);
                const draggingRef = useRef(false);
                const coloringRef = useRef(false);
                const lastPointerRef = useRef({ x: 0, y: 0 });
                const [isDragging, setIsDragging] = useState(false);

                const screenPointToSvg = (clientX, clientY) => {
                    const svg = svgRef.current;
                    if (!svg) return null;

                    const point = svg.createSVGPoint();
                    point.x = clientX;
                    point.y = clientY;

                    const ctm = svg.getScreenCTM();
                    if (!ctm) return null;
                    return point.matrixTransform(ctm.inverse());
                };

                const screenPointToMath = (clientX, clientY) => {
                    const svg = svgRef.current;
                    const mathGroup = mathGroupRef.current;
                    if (!svg || !mathGroup) return null;

                    const point = svg.createSVGPoint();
                    point.x = clientX;
                    point.y = clientY;
                    const ctm = mathGroup.getScreenCTM();
                    if (!ctm) return null;
                    return point.matrixTransform(ctm.inverse());
                };

                const handlePointerDown = (e) => {
                    if (tool === 'pan') {
                        e.preventDefault();
                        const point = screenPointToSvg(e.clientX, e.clientY);
                        if (!point) return;

                        draggingRef.current = true;
                        setIsDragging(true);
                        lastPointerRef.current = { x: point.x, y: point.y };
                        e.currentTarget.setPointerCapture?.(e.pointerId);
                        return;
                    }

                    if (!isComplete) return;

                    if (tool === 'fill') {
                        e.preventDefault();
                        const point = screenPointToMath(e.clientX, e.clientY);
                        if (!point) return;

                        const region = findFillRegionAt(point);
                        if (region) {
                            addColorAction({
                                type: 'fill',
                                regionId: region.id,
                                rings: region.rings.map(ring => ring.map(([x, y]) => [x, y])),
                                color: selectedColor
                            });
                        }
                        return;
                    }

                    if (tool === 'brush' || tool === 'eraser') {
                        e.preventDefault();
                        const point = screenPointToMath(e.clientX, e.clientY);
                        if (!point) return;

                        const isEraser = tool === 'eraser';
                        coloringRef.current = true;
                        setCurrentColorStroke({
                            type: isEraser ? 'erase' : 'stroke',
                            color: isEraser ? '#ffffff' : selectedColor,
                            width: isEraser ? brushSize * 1.8 : brushSize,
                            opacity: isEraser ? 1 : 0.72,
                            points: [[point.x, point.y]]
                        });
                        e.currentTarget.setPointerCapture?.(e.pointerId);
                    }
                };

                const handlePointerMove = (e) => {
                    if (tool === 'pan' && draggingRef.current) {
                        e.preventDefault();
                        const point = screenPointToSvg(e.clientX, e.clientY);
                        if (!point) return;

                        const dx = point.x - lastPointerRef.current.x;
                        const dy = point.y - lastPointerRef.current.y;
                        setPan(prev => ({ x: prev.x + dx, y: prev.y + dy }));
                        lastPointerRef.current = { x: point.x, y: point.y };
                        return;
                    }

                    if ((tool === 'brush' || tool === 'eraser') && isComplete && coloringRef.current) {
                        e.preventDefault();
                        const point = screenPointToMath(e.clientX, e.clientY);
                        if (!point) return;

                        setCurrentColorStroke(prev => {
                            if (!prev) return prev;
                            const last = prev.points[prev.points.length - 1];
                            const distance = Math.hypot(point.x - last[0], point.y - last[1]);
                            if (distance < 0.05) return prev;
                            return { ...prev, points: [...prev.points, [point.x, point.y]] };
                        });
                    }
                };

                const handlePointerUp = (e) => {
                    if (draggingRef.current) {
                        draggingRef.current = false;
                        setIsDragging(false);
                    }

                    if (coloringRef.current) {
                        coloringRef.current = false;
                        setCurrentColorStroke(previous => {
                            if (previous && previous.points.length > 0) {
                                addColorAction(previous);
                            }
                            return null;
                        });
                    }

                    if (e.currentTarget.hasPointerCapture?.(e.pointerId)) {
                        e.currentTarget.releasePointerCapture(e.pointerId);
                    }
                };

                const handleWheel = (e) => {
                    e.preventDefault();
                    if (e.ctrlKey || e.metaKey) return;
                    const delta = e.deltaY * -0.001;
                    setZoom(z => Math.max(0.5, Math.min(z + delta, 4)));
                };

                const handleCanvasClick = (e) => {
                    if (tool !== 'draw' || isComplete) return;

                    const localPt = screenPointToMath(e.clientX, e.clientY);
                    if (!localPt) return;

                    const snappedX = Math.round(localPt.x * 2) / 2;
                    const snappedY = Math.round(localPt.y * 2) / 2;
                    handlePointClick(snappedX, snappedY);
                };

                const gridLines = [];
                const xMin = theme.xRange[0];
                const xMax = theme.xRange[1];
                const yMin = theme.yRange[0];
                const yMax = theme.yRange[1];

                for (let i = xMin; i <= xMax; i += 1) {
                    if (i !== 0) {
                        gridLines.push(
                            <line
                                key={`vx-${i}`}
                                x1={i}
                                y1={yMin}
                                x2={i}
                                y2={yMax}
                                stroke="#c7cbd1"
                                strokeWidth={0.035}
                            />
                        );
                        if (i !== xMax) {
                            gridLines.push(
                                <text
                                    key={`tx-${i}`}
                                    x={i}
                                    y="0.48"
                                    fontSize="0.42"
                                    fill="#374151"
                                    textAnchor="middle"
                                    transform="scale(1, -1)"
                                >
                                    {i}
                                </text>
                            );
                        }
                    }
                }

                for (let i = yMin; i <= yMax; i += 1) {
                    if (i !== 0) {
                        gridLines.push(
                            <line
                                key={`vy-${i}`}
                                x1={xMin}
                                y1={i}
                                x2={xMax}
                                y2={i}
                                stroke="#c7cbd1"
                                strokeWidth={0.035}
                            />
                        );
                        if (i !== yMax) {
                            gridLines.push(
                                <text
                                    key={`ty-${i}`}
                                    x="-0.28"
                                    y={-i + 0.14}
                                    fontSize="0.42"
                                    fill="#374151"
                                    textAnchor="end"
                                    transform="scale(1, -1)"
                                >
                                    {i}
                                </text>
                            );
                        }
                    }
                }

                const axesGroup = (
                    <g key="axes" className="pointer-events-none">
                        <rect
                            x={xMin}
                            y={yMin}
                            width={xMax - xMin}
                            height={yMax - yMin}
                            fill="none"
                            stroke="#9ca3af"
                            strokeWidth={0.08}
                        />

                        <line
                            x1={xMin}
                            y1={0}
                            x2={xMax - 0.35}
                            y2={0}
                            stroke="#111827"
                            strokeWidth={0.08}
                            strokeLinecap="round"
                        />
                        <polygon
                            points={`${xMax - 0.35},0.18 ${xMax - 0.35},-0.18 ${xMax},0`}
                            fill="#111827"
                        />
                        <text
                            x={xMax - 0.12}
                            y="0.55"
                            fontSize="0.58"
                            fill="#111827"
                            fontStyle="italic"
                            transform="scale(1, -1)"
                        >
                            x
                        </text>

                        <line
                            x1={0}
                            y1={yMin}
                            x2={0}
                            y2={yMax - 0.35}
                            stroke="#111827"
                            strokeWidth={0.08}
                            strokeLinecap="round"
                        />
                        <polygon
                            points={`-0.18,${yMax - 0.35} 0.18,${yMax - 0.35} 0,${yMax}`}
                            fill="#111827"
                        />
                        <text
                            x="-0.48"
                            y={-(yMax - 0.18)}
                            fontSize="0.58"
                            fill="#111827"
                            fontStyle="italic"
                            transform="scale(1, -1)"
                        >
                            y
                        </text>

                        <text
                            x="-0.28"
                            y="0.52"
                            fontSize="0.52"
                            fill="#111827"
                            fontStyle="italic"
                            textAnchor="end"
                            transform="scale(1, -1)"
                        >
                            O
                        </text>
                    </g>
                );

                const cursorClass = tool === 'pan'
                    ? (isDragging ? 'cursor-grabbing' : 'cursor-grab')
                    : tool === 'fill'
                        ? 'cursor-cell'
                        : tool === 'eraser'
                            ? 'cursor-not-allowed'
                            : 'cursor-crosshair';

                return (
                    <svg
                        ref={svgRef}
                        className={`w-full h-full ${cursorClass}`}
                        viewBox={`${xMin - 0.8} ${-yMax - 0.8} ${xMax - xMin + 1.6} ${yMax - yMin + 1.6}`}
                        preserveAspectRatio="xMidYMid meet"
                        style={{ touchAction: 'none' }}
                        onPointerDown={handlePointerDown}
                        onPointerMove={handlePointerMove}
                        onPointerUp={handlePointerUp}
                        onPointerCancel={handlePointerUp}
                        onWheel={handleWheel}
                        onClick={handleCanvasClick}
                    >
                        <g id="viewport-group" transform={`translate(${pan.x} ${pan.y}) scale(${zoom})`}>
                            <g ref={mathGroupRef} transform="scale(1, -1)">
                                <rect
                                    x={xMin}
                                    y={yMin}
                                    width={xMax - xMin}
                                    height={yMax - yMin}
                                    fill="#ffffff"
                                />

                                {/* 나중에 한 색칠 작업일수록 위에 표시됩니다. */}
                                <g className="pointer-events-none">
                                    {colorActions.map((action, i) => {
                                        if (action.type === 'fill') {
                                            const rings = action.rings || (action.points ? [action.points] : []);
                                            if (rings.length === 0) return null;
                                            return (
                                                <path
                                                    key={`fill-${i}`}
                                                    d={ringsToPath(rings)}
                                                    fill={action.color}
                                                    fillOpacity="0.76"
                                                    fillRule="evenodd"
                                                    clipRule="evenodd"
                                                />
                                            );
                                        }

                                        return (
                                            <polyline
                                                key={`stroke-${i}`}
                                                points={strokePointsToString(action.points)}
                                                fill="none"
                                                stroke={action.color}
                                                strokeWidth={action.width}
                                                strokeOpacity={action.opacity ?? (action.type === 'erase' ? 1 : 0.72)}
                                                strokeLinecap="round"
                                                strokeLinejoin="round"
                                            />
                                        );
                                    })}

                                    {currentColorStroke && (
                                        <polyline
                                            points={strokePointsToString(currentColorStroke.points)}
                                            fill="none"
                                            stroke={currentColorStroke.color}
                                            strokeWidth={currentColorStroke.width}
                                            strokeOpacity={currentColorStroke.opacity ?? (currentColorStroke.type === 'erase' ? 1 : 0.72)}
                                            strokeLinecap="round"
                                            strokeLinejoin="round"
                                        />
                                    )}
                                </g>

                                {gridLines}
                                {axesGroup}

                                {drawnShapes.map((shape, i) => (
                                    <g key={`shape-${i}`}>
                                        <polyline
                                            points={shape.map(p => `${p[0]},${p[1]}`).join(' ')}
                                            fill="none"
                                            stroke="#1e1b4b"
                                            strokeWidth="0.15"
                                            strokeLinecap="round"
                                            strokeLinejoin="round"
                                        />
                                        {shape.map((p, j) => (
                                            <circle key={`dp-${i}-${j}`} cx={p[0]} cy={p[1]} r="0.1" fill="#ef4444" />
                                        ))}
                                    </g>
                                ))}

                                {currentLine.length > 0 && (
                                    <g>
                                        <polyline
                                            points={currentLine.map(p => `${p[0]},${p[1]}`).join(' ')}
                                            fill="none"
                                            stroke="#4f46e5"
                                            strokeWidth="0.15"
                                            strokeLinecap="round"
                                            strokeLinejoin="round"
                                        />
                                        {currentLine.map((p, j) => (
                                            <circle key={`cp-${j}`} cx={p[0]} cy={p[1]} r="0.1" fill="#ef4444" />
                                        ))}
                                    </g>
                                )}
                            </g>
                        </g>
                    </svg>
                );
            };

            const completionMessage = !isComplete
                ? '왼쪽 목록에서 노란색으로 활성화된 좌표를 찾아 점을 찍어보세요!'
                : tool === 'fill'
                    ? '영역 채우기: 선으로 완전히 둘러싸인 부분을 클릭하면 그 부분만 채워집니다.'
                    : tool === 'brush'
                        ? '붓칠: 모든 선을 자유롭게 칠할 수 있습니다.'
                        : tool === 'eraser'
                            ? '지우개: 칠한 부분을 문질러 지울 수 있습니다.'
                            : '손바닥 도구로 화면을 이동할 수 있습니다.';

            return (
                <div className="flex flex-col h-full w-full overflow-hidden bg-slate-50">
                    <header className="bg-white border-b border-slate-200 px-4 py-3 flex justify-between items-center gap-3 shrink-0 shadow-sm z-20">
                        <div className="flex items-center gap-2 text-indigo-700 shrink-0">
                            <i className="ph-fill ph-bezier-curve text-2xl"></i>
                            <h1 className="text-lg md:text-xl font-bold tracking-tight">좌표 그림 그리기</h1>
                            <span className="hidden sm:inline-flex text-[11px] font-bold px-2 py-1 rounded-full bg-amber-50 border border-amber-200 text-amber-800">학생용</span>
                        </div>

                        <div className="flex items-center justify-end gap-2 min-w-0">
                            <select
                                value={activeThemeId}
                                onChange={handleThemeChange}
                                className="min-w-0 max-w-[52vw] px-3 py-1.5 bg-slate-100 border border-slate-300 rounded-md text-slate-700 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            >
                                <optgroup label="간단한 그림 (순서쌍 10~17개)">
                                    {SIMPLE_THEME_IDS.map(id => {
                                        const t = THEMES[id];
                                        return (
                                            <option key={t.id} value={t.id}>
                                                {t.name} · 순서쌍 {getPointCount(t)}개
                                            </option>
                                        );
                                    })}
                                </optgroup>
                                <optgroup label="도전 그림">
                                    {CHALLENGE_THEME_IDS.map(id => {
                                        const t = THEMES[id];
                                        return (
                                            <option key={t.id} value={t.id}>
                                                {t.name} · 순서쌍 {getPointCount(t)}개
                                            </option>
                                        );
                                    })}
                                </optgroup>
                            </select>
                        </div>
                    </header>

                    <div className="flex flex-col md:flex-row flex-1 overflow-hidden relative">
                        <div className="w-full md:w-[280px] lg:w-[320px] h-full bg-white border-r border-slate-200 flex flex-col shrink-0 z-10 shadow-[4px_0_15px_rgba(0,0,0,0.03)]">
                            <div className="p-4 bg-indigo-50/50 border-b border-indigo-100 flex justify-between items-center shrink-0">
                                <h2 className="font-bold text-indigo-800 text-sm md:text-base flex items-center gap-1.5">
                                    <i className="ph-bold ph-list-numbers"></i> 목표 좌표
                                </h2>
                                <span className="text-xs font-semibold bg-indigo-200 text-indigo-800 px-2 py-1 rounded-full">
                                    진행도: {progress}%
                                </span>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
                                {theme.shapes.map((shape, sIdx) => {
                                    const isPastShape = isComplete || sIdx < currentShapeIdx;
                                    const isCurrentShape = !isComplete && sIdx === currentShapeIdx;

                                    return (
                                        <div key={sIdx} className={`transition-opacity duration-300 ${isPastShape ? 'opacity-50' : 'opacity-100'}`}>
                                            <h3 className="text-sm font-bold text-slate-700 mb-3 border-b pb-1">
                                                Shape {sIdx + 1}
                                            </h3>
                                            <div className="flex flex-wrap gap-2">
                                                {shape.map((pt, pIdx) => {
                                                    const isCompleted = isPastShape || (isCurrentShape && pIdx < targetPointIdx);
