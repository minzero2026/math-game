                    <text x={boardSize - margin + 12} y={halfSize + 18} fontSize="16" fontWeight="bold" fontStyle="italic" fill="#000000">x</text>
                    <text x={halfSize + 10} y={margin - 12} fontSize="16" fontWeight="bold" fontStyle="italic" fill="#000000">y</text>

                    <line x1={margin - 15} y1={halfSize} x2={boardSize - margin + 18} y2={halfSize} stroke="#000000" strokeWidth="3" />
                    <line x1={halfSize} y1={boardSize - margin + 15} x2={halfSize} y2={margin - 18} stroke="#000000" strokeWidth="3" />

                    <polygon points={`${boardSize - margin + 18},${halfSize} ${boardSize - margin + 8},${halfSize - 6} ${boardSize - margin + 8},${halfSize + 6}`} fill="#000000" />
                    <polygon points={`${halfSize},${margin - 18} ${halfSize - 6},${margin - 8} ${halfSize + 6},${margin - 8}`} fill="#000000" />

                    {/* 흰 돌 렌더링 (애니메이션 픽셀 좌표 기반) */}
                    {animatedWhite.x !== null && (
                      <g filter="url(#stoneShadow)">
                        <circle cx={animatedWhite.x} cy={animatedWhite.y} r="12.5" fill="url(#whiteStoneGrad)" />
                        <defs>
                          <radialGradient id="whiteStoneGrad" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stopColor="#ffffff" />
                            <stop offset="75%" stopColor="#f8fafc" />
                            <stop offset="100%" stopColor="#94a3b8" />
                          </radialGradient>
                        </defs>
                      </g>
                    )}

                    {/* 검은 돌 렌더링 (애니메이션 픽셀 좌표 기반) */}
                    {animatedBlack.x !== null && (
                      <g filter="url(#stoneShadow)" opacity={blackOpacity}>
                        <circle cx={animatedBlack.x} cy={animatedBlack.y} r="12.5" fill="url(#blackStoneGrad)" />
                        <circle cx={animatedBlack.x - 3} cy={animatedBlack.y - 3} r="2" fill="white" opacity="0.8" />
                        <defs>
                          <radialGradient id="blackStoneGrad" cx="35%" cy="35%" r="65%">
                            <stop offset="0%" stopColor="#5a6a85" />
                            <stop offset="25%" stopColor="#1e293b" />
                            <stop offset="100%" stopColor="#020617" />
                          </radialGradient>
                        </defs>
                      </g>
                    )}

                    {/* 돌 좌표 라벨 (애니메이션 중에는 숨김 처리) */}
                    {whiteStone.x !== null && gameState !== 'PLACE_WHITE' && gameState !== 'ANIMATING' && (
                      <g transform={`translate(${toSvgCoords(whiteStone.x, whiteStone.y).x}, ${toSvgCoords(whiteStone.x, whiteStone.y).y})`}>
                        <rect x="-44" y="16" width="88" height="26" rx="13" ry="13" fill="rgba(235, 228, 210, 0.9)" stroke="rgba(45, 37, 30, 0.25)" strokeWidth="1.5" filter="url(#stoneShadow)" />
                        <text x="0" y="34" fill="#2d251e" fontSize="17" fontWeight="900" textAnchor="middle" letterSpacing="0.2">
                          ( {whiteStone.x}, {whiteStone.y} )
                        </text>
                      </g>
                    )}

                    {blackStone.x !== null && gameState !== 'PLACE_WHITE' && gameState !== 'ANIMATING' && (
                      <g transform={`translate(${toSvgCoords(blackStone.x, blackStone.y).x}, ${toSvgCoords(blackStone.x, blackStone.y).y})`}>
                        <rect x="-44" y="16" width="88" height="26" rx="13" ry="13" fill="rgba(235, 228, 210, 0.9)" stroke="rgba(45, 37, 30, 0.25)" strokeWidth="1.5" filter="url(#stoneShadow)" />
                        <text x="0" y="34" fill="#2d251e" fontSize="17" fontWeight="900" textAnchor="middle" letterSpacing="0.2">
                          ( {blackStone.x}, {blackStone.y} )
                        </text>
                      </g>
                    )}
                  </svg>
                </div>
              )}
            </section>

            {/* [우측 기둥] 가로형 기울기 입력기 및 치기 실행 패널 (공식 연습 일 때는 보이지 않게 숨김 처리) */}
            {gameMode !== 'PRACTICE' && (
              <section className="input-container flex flex-col items-center justify-center p-4 bg-[#cbd5e1]/50 border border-slate-300 rounded-3xl shadow-xl w-[260px] shrink-0 animate-fade-in">
                <h3 className="text-xl font-black text-slate-800 mb-6 tracking-wide">기울기 입력</h3>
                
                <div className="flex items-center gap-4 justify-center">
                  
                  {/* 연두색 부호 스위치 단추 */}
                  <button
                    type="button"
                    disabled={gameState !== 'INPUT_SLOPE'}
                    onClick={() => setSlopeSign(prev => prev * -1)}
                    className={`w-11 h-11 rounded-full flex items-center justify-center font-extrabold text-2xl text-white transition-all shadow-md active:scale-95 ${
                      gameState !== 'INPUT_SLOPE'
                        ? 'opacity-40 bg-emerald-700'
                        : 'bg-[#4ca62a] hover:bg-[#439524] border-2 border-white'
                    }`}
                    style={{ boxShadow: '0 4px 6px -1px rgba(0,0,0,0.2)' }}
                  >
                    {slopeSign === 1 ? '+' : '-'}
                  </button>

                  {/* 분모 분자 입력란에 터치형 콤보 스핀 컴포넌트 장착 */}
                  <div className="flex flex-col items-center gap-2">
                    {/* 분자 */}
                    <CustomSpinner
                      value={inputNum}
                      onChange={(val) => setInputNum(val)}
                      disabled={gameState !== 'INPUT_SLOPE'}
                      min={0}
                    />
                    
                    {/* 검은 분수 가로선 */}
                    <div className="w-16 h-1 bg-slate-800 rounded-full" />
                    
                    {/* 분모 */}
                    <CustomSpinner
                      value={inputDen}
                      onChange={(val) => setInputDen(val)}
                      disabled={gameState !== 'INPUT_SLOPE'}
                      min={0}
                    />
                  </div>

                  {/* 짙은 차콜 캡슐형 "치기" 실행 버튼 */}
                  <button
                    onClick={handleHit}
                    disabled={gameState !== 'INPUT_SLOPE'}
                    className="px-5 py-3.5 bg-[#404040] hover:bg-[#2b2b2b] text-white font-black text-base rounded-full shadow-lg transition-all active:scale-95 disabled:bg-slate-400 disabled:text-slate-200 disabled:cursor-not-allowed border border-slate-600"
                    style={{ borderRadius: '1.5rem' }}
                  >
                    치기
                  </button>
                </div>

                {/* 실시간 피드백 알림 영역 */}
                <div className={`mt-6 px-4 py-2.5 rounded-xl text-center bg-white/90 border border-slate-300 shadow-md transition-all duration-300 w-full ${feedbackMsg ? 'opacity-100 scale-100' : 'opacity-0 scale-95 pointer-events-none'}`}>
                  <p className={`text-sm font-black ${isHitCorrect ? 'text-emerald-700' : 'text-rose-600'}`}>
                    {feedbackMsg || '조준 완료'}
                  </p>
                </div>
              </section>
            )}

          </main>
        </div>
      );
    }

    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
