<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>오목 게임</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: #f9fdff;
      --bg2: #eaf8f4;
      --panel: #ffffff;
      --panel-soft: #eef9f7;
      --text: #26353e;
      --muted: #6d7d86;
      --accent: #3ca69e;
      --accent-dark: #247c76;
      --gold: #f1b83f;
      --red: #e65e59;
      --line: rgba(91, 62, 31, .75);
      --wood1: #f5d9a7;
      --wood2: #ddb36b;
      --shadow: 0 10px 26px rgba(70, 99, 110, .14);
    }

    html, body { width: 100%; min-height: 100%; }

    body {
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      padding: 10px;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg1), var(--bg2));
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(100%, 1120px);
      height: calc(100vh - 20px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topbar {
      flex: 0 0 auto;
      min-height: 54px;
      background: rgba(255, 255, 255, .95);
      border: 1px solid rgba(60, 166, 158, .18);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .title-wrap { text-align: center; }

    .title-wrap h1 {
      font-size: clamp(22px, 3vw, 31px);
      letter-spacing: -.04em;
      line-height: 1.1;
    }

    .title-wrap p {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .game-layout {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 10px;
    }

    .board-panel,
    .side-panel {
      background: rgba(255, 255, 255, .94);
      border: 1px solid rgba(60, 166, 158, .14);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .board-panel {
      min-width: 0;
      min-height: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .turn-message {
      flex: 0 0 auto;
      min-height: 42px;
      background: var(--panel-soft);
      border-radius: 13px;
      padding: 9px 12px;
      text-align: center;
      font-size: 16px;
      font-weight: 900;
      color: var(--accent-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
    }

    .turn-stone {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .turn-stone.black {
      background: radial-gradient(circle at 34% 28%, #777, #111 58%, #020202);
      box-shadow: inset -2px -3px 5px rgba(0,0,0,.35), 0 2px 5px rgba(0,0,0,.22);
    }

    .turn-stone.white {
      background: radial-gradient(circle at 34% 28%, #fff, #f0f0f0 55%, #c9c9c9);
      border: 1px solid #b7b7b7;
      box-shadow: inset -2px -3px 5px rgba(0,0,0,.12), 0 2px 5px rgba(0,0,0,.12);
    }

    .board-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .board {
      width: min(100%, calc(100vh - 150px), 700px);
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      background: linear-gradient(145deg, var(--wood1), var(--wood2));
      box-shadow: 0 14px 30px rgba(111, 79, 37, .22), inset 0 0 0 5px rgba(130, 88, 34, .15);
      padding: 2.5%;
      position: relative;
    }

    svg { width: 100%; height: 100%; display: block; }

    .side-panel {
      min-height: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      overflow-y: auto;
    }

    .players {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .player-card {
      border: 3px solid transparent;
      border-radius: 15px;
      background: #fff;
      box-shadow: 0 6px 16px rgba(70, 99, 110, .10);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      transition: .18s ease;
    }


    .stone {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .stone.black {
      background: radial-gradient(circle at 34% 28%, #777, #111 58%, #020202);
      box-shadow: inset -2px -3px 5px rgba(0,0,0,.35), 0 2px 5px rgba(0,0,0,.22);
    }

    .stone.white {
      background: radial-gradient(circle at 34% 28%, #fff, #f0f0f0 55%, #c9c9c9);
      border: 1px solid #b7b7b7;
      box-shadow: inset -2px -3px 5px rgba(0,0,0,.12), 0 2px 5px rgba(0,0,0,.12);
    }

    .player-info { min-width: 0; flex: 1; }
    .player-name {
      font-weight: 900;
      font-size: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-role { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .player-score { flex: 0 0 auto; font-weight: 900; color: var(--accent-dark); font-size: 17px; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hidden { display: none !important; }

    button, input { font: inherit; }

    .btn {
      min-height: 46px;
      border: none;
      border-radius: 13px;
      background: #fff;
      color: var(--text);
      font-weight: 900;
      font-size: 15px;
      box-shadow: 0 6px 16px rgba(70, 99, 110, .11);
      cursor: pointer;
      padding: 9px 11px;
    }

    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .42; pointer-events: none; }
    .btn.primary { background: var(--accent); color: #fff; }
    .btn.next { background: #fff3df; color: #8a5917; }

    .rules {
      margin-top: auto;
      background: var(--panel-soft);
      border-radius: 14px;
      padding: 13px;
      color: #4f616a;
      font-size: 13px;
      line-height: 1.5;
    }

    .rules-title {
      color: var(--accent-dark);
      font-size: 16px;
      font-weight: 900;
      margin-bottom: 9px;
    }

    .rule-list {
      display: grid;
      gap: 8px;
      list-style: none;
    }

    .rule-item {
      display: grid;
      grid-template-columns: 27px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      background: rgba(255, 255, 255, .72);
      border-radius: 11px;
      padding: 9px 10px 9px 8px;
    }

    .rule-number {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #fff;
      font-weight: 900;
      line-height: 1;
    }

    .rule-text strong { color: var(--accent-dark); }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(47, 68, 78, .34);
      backdrop-filter: blur(4px);
      padding: 16px;
      z-index: 50;
    }

    .overlay.show { display: flex; }

    .modal-card,
    .winner-card,
    .confirm-card {
      width: min(94vw, 460px);
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 20px 48px rgba(49, 74, 84, .28);
      padding: 21px;
    }

    .modal-card h2,
    .confirm-card h2 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .modal-desc,
    .confirm-desc {
      text-align: center;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .field { margin-top: 13px; }
    .field label { display: block; font-weight: 900; margin-bottom: 7px; }

    .name-grid,
    .seg,
    .modal-actions,
    .confirm-actions,
    .winner-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    input[type="text"] {
      width: 100%;
      min-height: 47px;
      border: 2px solid #dbe9e7;
      border-radius: 12px;
      padding: 9px 11px;
      color: var(--text);
      background: #fbfefe;
      font-weight: 800;
      user-select: text;
      -webkit-user-select: text;
      outline: none;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: #9aa9af; font-weight: 700; }

    .seg button {
      min-height: 47px;
      border: 2px solid #dbe9e7;
      border-radius: 12px;
      background: #f8fcfb;
      color: #54656e;
      font-weight: 900;
      cursor: pointer;
    }

    .seg button.on {
      background: var(--panel-soft);
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    .rps-box {
      margin-top: 15px;
      background: #fff9e9;
      border: 1px solid #f1d992;
      border-radius: 15px;
      padding: 12px;
    }

    .rps-box .guide {
      color: #6c5a2d;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .modal-actions { grid-template-columns: 1fr 1.35fr; margin-top: 17px; }
    .confirm-actions { margin-top: 17px; }

    .winner-card { width: min(94vw, 680px); text-align: center; }
    .winner-stone { width: 60px; height: 60px; margin: 0 auto 11px; }
    .winner-card h2 { font-size: 27px; }
    #winnerMessage {
      display: grid;
      gap: 2px;
      color: var(--muted);
      line-height: 1.6;
      margin: 7px 0 16px;
      font-size: clamp(13px, 2vw, 16px);
      word-break: keep-all;
    }
    #winnerMessage .message-line {
      display: block;
      white-space: nowrap;
    }
    .winner-actions { grid-template-columns: 1fr 1.3fr; }

    @media (max-width: 820px), (orientation: portrait) {
      body {
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
        padding: 8px;
      }

      .app {
        height: auto;
        min-height: calc(100vh - 16px);
        gap: 8px;
      }

      .topbar { min-height: 52px; border-radius: 15px; padding: 8px 12px; }

      .game-layout {
        display: flex;
        flex-direction: column;
        min-height: auto;
      }

      .board-panel { padding: 8px; border-radius: 15px; }
      .turn-message { min-height: 38px; padding: 7px 9px; font-size: 15px; }
      .board { width: min(96vw, 650px); max-height: none; border-radius: 13px; }

      .side-panel {
        overflow: visible;
        border-radius: 15px;
        padding: 8px;
      }

      .players { grid-template-columns: 1fr 1fr; }
      .player-card { padding: 8px; gap: 7px; }
      .stone { width: 28px; height: 28px; }
      .player-name { font-size: 14px; }
      .player-role { font-size: 11px; }
      .player-score { font-size: 15px; }
      .controls { grid-template-columns: repeat(2, 1fr); }
      .btn { min-height: 44px; padding: 8px 5px; font-size: 14px; }
      .rules { margin-top: 0; font-size: 12px; padding: 11px; }
    }

    @media (max-width: 620px) {
      .winner-card { width: min(94vw, 500px); }
      .winner-card h2,
      #winnerMessage .message-line { white-space: normal; }
    }

    @media (max-width: 480px) {
      .players { grid-template-columns: 1fr; }
      .rules { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-wrap">
        <h1>오목 게임</h1>
      </div>
    </header>

    <section class="game-layout">
      <section class="board-panel">
        <div class="turn-message" id="turnMessage"><span id="turnText">설정에서 첫 흑돌 학생을 정해 주세요.</span><span class="turn-stone black hidden" id="turnStone" aria-hidden="true"></span></div>
        <div class="board-wrap">
          <div class="board">
            <svg id="svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
          </div>
        </div>
      </section>

      <aside class="side-panel">
        <section class="players">
          <div class="player-card" id="playerCard0">
            <div class="stone" id="playerStone0"></div>
            <div class="player-info">
              <div class="player-name" id="playerName0">학생 1</div>
              <div class="player-role" id="playerRole0">흑돌 · 선공</div>
            </div>
            <div class="player-score" id="playerScore0">0승</div>
          </div>

          <div class="player-card" id="playerCard1">
            <div class="stone" id="playerStone1"></div>
            <div class="player-info">
              <div class="player-name" id="playerName1">학생 2</div>
              <div class="player-role" id="playerRole1">백돌 · 후공</div>
            </div>
            <div class="player-score" id="playerScore1">0승</div>
          </div>
        </section>

        <section class="controls">
          <button class="btn" id="undoBtn" onclick="undo()">무르기</button>
          <button class="btn primary" onclick="openSettings()">설정</button>
          <button class="btn next hidden" id="nextRoundBtn" onclick="nextRound()">다음 판</button>
        </section>

        <section class="rules">
          <div class="rules-title">게임 규칙</div>
          <ol class="rule-list">
            <li class="rule-item">
              <span class="rule-number">1</span>
              <span class="rule-text">첫 판은 가위바위보 승자가 흑돌을 맡습니다.</span>
            </li>
            <li class="rule-item">
              <span class="rule-number">2</span>
              <span class="rule-text">흑돌이 항상 먼저 두고, 다음 판에는 두 학생이 돌 색을 바꿉니다.</span>
            </li>
            <li class="rule-item">
              <span class="rule-number">3</span>
              <span class="rule-text">가로·세로·대각선으로 돌을 <strong>5개 이상</strong> 먼저 연결하면 이깁니다.</span>
            </li>
          </ol>
        </section>
      </aside>
    </section>
  </main>

  <div class="overlay show" id="settingsOverlay">
    <div class="modal-card">
      <h2>게임 준비</h2>
      <div class="field">
        <label>학생 이름</label>
        <div class="name-grid">
          <input type="text" id="nameInput0" value="" placeholder="이름 입력" maxlength="12" aria-label="첫 번째 학생 이름">
          <input type="text" id="nameInput1" value="" placeholder="이름 입력" maxlength="12" aria-label="두 번째 학생 이름">
        </div>
      </div>

      <div class="field">
        <label>바둑판 크기</label>
        <div class="seg">
          <button id="size13Btn" onclick="selectSize(13)">13 × 13</button>
          <button id="size15Btn" class="on" onclick="selectSize(15)">15 × 15</button>
        </div>
      </div>

      <div class="rps-box">
        <div class="guide"><strong>가위바위보 승자는 누구인가요?</strong><br>선택한 학생이 첫 판의 흑돌을 맡아 먼저 둡니다.</div>
        <div class="seg">
          <button id="blackPlayer0Btn" class="on" onclick="selectFirstBlack(0)">학생 1</button>
          <button id="blackPlayer1Btn" onclick="selectFirstBlack(1)">학생 2</button>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn" id="cancelSettingsBtn" onclick="closeSettings()">취소</button>
        <button class="btn primary" onclick="applySettings()">게임 시작</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="resultOverlay">
    <div class="winner-card">
      <div class="winner-stone stone black" id="winnerStone"></div>
      <h2 id="winnerTitle">승리!</h2>
      <p id="winnerMessage"></p>
      <div class="winner-actions">
        <button class="btn" onclick="closeResult()">판 보기</button>
        <button class="btn primary" onclick="nextRound()">다음 판</button>
      </div>
    </div>
  </div>

  <script>
    let N = 15;
    let selectedSize = 15;
    let board = [];
    let turn = 1; // 1=흑돌, 2=백돌
    let history = [];
    let gameOver = false;
    let winLine = null;
    let hasStarted = false;

    let players = [
      { name: '학생 1', score: 0 },
      { name: '학생 2', score: 0 }
    ];

    let blackPlayer = 0;       // 현재 판에서 흑돌을 맡은 학생 인덱스
    let selectedFirstBlack = 0;

    /* ===== 태블릿별 자동 저장 ===== */
    const STORAGE_KEY = 'classroom_omok_autosave_v1';

    function saveGame() {
      if (!hasStarted) return;

      const state = {
        version: 1,
        N,
        selectedSize,
        board,
        turn,
        history,
        gameOver,
        winLine,
        hasStarted,
        players,
        blackPlayer,
        selectedFirstBlack,
        savedAt: Date.now()
      };

      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (error) {
        console.warn('오목 게임 자동 저장에 실패했습니다.', error);
      }
    }

    function loadGame() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;

        const state = JSON.parse(raw);
        const validSize = state.N === 13 || state.N === 15;
        const validPlayers = Array.isArray(state.players) && state.players.length === 2;
        const validBoard = validSize && Array.isArray(state.board) &&
          state.board.length === state.N &&
          state.board.every(row => Array.isArray(row) && row.length === state.N);

        if (!validSize || !validPlayers || !validBoard || !state.hasStarted) {
          localStorage.removeItem(STORAGE_KEY);
          return false;
        }

        N = state.N;
        selectedSize = state.N;
        board = state.board;
        turn = state.turn === 2 ? 2 : 1;
        history = Array.isArray(state.history) ? state.history : [];
        gameOver = Boolean(state.gameOver);
        winLine = Array.isArray(state.winLine) ? state.winLine : null;
        hasStarted = true;
        players = state.players.map((player, index) => ({
          name: String(player?.name || `학생 ${index + 1}`).slice(0, 12),
          score: Math.max(0, Number(player?.score) || 0)
        }));
        blackPlayer = state.blackPlayer === 1 ? 1 : 0;
        selectedFirstBlack = blackPlayer;

        return true;
      } catch (error) {
        console.warn('저장된 오목 게임을 불러오지 못했습니다.', error);
        localStorage.removeItem(STORAGE_KEY);
        return false;
      }
    }

    const M = 4;
    const SPAN = 92;
    const svg = document.getElementById('svg');
    const pos = i => M + i * (SPAN / (N - 1));
    const inBounds = (r, c) => r >= 0 && r < N && c >= 0 && c < N;

    function colorPlayerIndex(color) {
      return color === 1 ? blackPlayer : 1 - blackPlayer;
    }

    function starPoints() {
      if (N === 15) return [[3,3],[3,11],[11,3],[11,11],[7,7]];
      if (N === 13) return [[3,3],[3,9],[9,3],[9,9],[6,6]];
      return [[Math.floor(N / 2), Math.floor(N / 2)]];
    }

    function drawBoard() {
      const cell = SPAN / (N - 1);
      const radius = cell * .46;
      let html = '';

      for (let i = 0; i < N; i++) {
        const p = pos(i);
        html += `<line x1="${pos(0)}" y1="${p}" x2="${pos(N-1)}" y2="${p}" stroke="var(--line)" stroke-width=".28"/>`;
        html += `<line x1="${p}" y1="${pos(0)}" x2="${p}" y2="${pos(N-1)}" stroke="var(--line)" stroke-width=".28"/>`;
      }

      starPoints().forEach(([r, c]) => {
        html += `<circle cx="${pos(c)}" cy="${pos(r)}" r=".7" fill="var(--line)"/>`;
      });

      for (let r = 0; r < N; r++) {
        for (let c = 0; c < N; c++) {
          const value = board[r][c];
          if (!value) continue;
          const gradient = value === 1 ? 'url(#blackGradient)' : 'url(#whiteGradient)';
          const stroke = value === 2 ? 'stroke="#b9b9b9" stroke-width=".18"' : '';
          html += `<circle cx="${pos(c)}" cy="${pos(r)}" r="${radius}" fill="${gradient}" ${stroke}/>`;
        }
      }

      if (history.length && !gameOver) {
        const last = history[history.length - 1];
        html += `<circle cx="${pos(last.c)}" cy="${pos(last.r)}" r="${radius * .34}" fill="none" stroke="#e85c58" stroke-width=".42"/>`;
      }

      if (gameOver && winLine) {
        winLine.forEach(([r, c]) => {
          html += `<circle cx="${pos(c)}" cy="${pos(r)}" r="${radius * 1.16}" fill="none" stroke="#f2b83f" stroke-width=".55"/>`;
        });
      }

      if (!gameOver && hasStarted) {
        for (let r = 0; r < N; r++) {
          for (let c = 0; c < N; c++) {
            if (board[r][c]) continue;
            html += `<circle cx="${pos(c)}" cy="${pos(r)}" r="${cell * .5}" fill="transparent" style="cursor:pointer" onclick="place(${r},${c})"/>`;
          }
        }
      }

      svg.innerHTML = `
        <defs>
          <radialGradient id="blackGradient" cx="34%" cy="28%" r="75%">
            <stop offset="0%" stop-color="#777"/>
            <stop offset="60%" stop-color="#151515"/>
            <stop offset="100%" stop-color="#020202"/>
          </radialGradient>
          <radialGradient id="whiteGradient" cx="34%" cy="28%" r="75%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="58%" stop-color="#f2f2f2"/>
            <stop offset="100%" stop-color="#c9c9c9"/>
          </radialGradient>
        </defs>${html}`;
    }

    function place(r, c) {
      if (!hasStarted || gameOver || board[r][c]) return;

      board[r][c] = turn;
      history.push({ r, c, p: turn });

      const winnerCells = checkWin(r, c, turn);
      if (winnerCells) {
        gameOver = true;
        winLine = winnerCells;
        players[colorPlayerIndex(turn)].score++;
        drawBoard();
        updateUI();
        saveGame();
        showWin(turn);
        return;
      }

      const hasEmpty = board.some(row => row.some(value => value === 0));
      if (!hasEmpty) {
        gameOver = true;
        winLine = null;
        drawBoard();
        updateUI();
        saveGame();
        showDraw();
        return;
      }

      turn = turn === 1 ? 2 : 1;
      drawBoard();
      updateUI();
      saveGame();
    }

    function checkWin(r, c, player) {
      const directions = [[0,1],[1,0],[1,1],[1,-1]];

      for (const [dr, dc] of directions) {
        const cells = [[r, c]];

        let nr = r + dr;
        let nc = c + dc;
        while (inBounds(nr, nc) && board[nr][nc] === player) {
          cells.push([nr, nc]);
          nr += dr;
          nc += dc;
        }

        nr = r - dr;
        nc = c - dc;
        while (inBounds(nr, nc) && board[nr][nc] === player) {
          cells.unshift([nr, nc]);
          nr -= dr;
          nc -= dc;
        }

        if (cells.length >= 5) return cells;
      }

      return null;
    }

    function startRound({ swapColors = false } = {}) {
      if (swapColors) blackPlayer = 1 - blackPlayer;

      board = Array.from({ length: N }, () => Array(N).fill(0));
      history = [];
      turn = 1; // 흑돌이 항상 선공
      gameOver = false;
      winLine = null;
      hasStarted = true;

      closeResult();
      drawBoard();
      updateUI();
      saveGame();
    }

    function nextRound() {
      if (!gameOver) return;
      startRound({ swapColors: true });
    }

    function undo() {
      if (!history.length) return;

      if (gameOver) {
        const lastPlayerColor = history[history.length - 1].p;
        const winnerIndex = colorPlayerIndex(lastPlayerColor);
        players[winnerIndex].score = Math.max(0, players[winnerIndex].score - 1);
        gameOver = false;
        winLine = null;
        closeResult();
      }

      const last = history.pop();
      board[last.r][last.c] = 0;
      turn = last.p;

      drawBoard();
      updateUI();
      saveGame();
    }

    function updateUI() {
      for (let i = 0; i < 2; i++) {
        const isBlack = i === blackPlayer;
        document.getElementById(`playerName${i}`).textContent = players[i].name;
        document.getElementById(`playerScore${i}`).textContent = `${players[i].score}승`;
        document.getElementById(`playerRole${i}`).textContent = isBlack ? '흑돌 · 선공' : '백돌 · 후공';
        document.getElementById(`playerStone${i}`).className = `stone ${isBlack ? 'black' : 'white'}`;
      }

      const currentIndex = colorPlayerIndex(turn);
      const turnText = document.getElementById('turnText');
      const turnStone = document.getElementById('turnStone');

      if (hasStarted) {
        turnText.textContent = `${players[currentIndex].name}의 차례`;
        turnStone.className = `turn-stone ${turn === 1 ? 'black' : 'white'}`;
      } else {
        turnText.textContent = '설정에서 첫 흑돌 학생을 정해 주세요.';
        turnStone.className = 'turn-stone black hidden';
      }

      document.getElementById('undoBtn').disabled = history.length === 0;
      document.getElementById('nextRoundBtn').classList.toggle('hidden', !gameOver);
    }

    function setWinnerMessage(firstLine, secondLine) {
      const messageBox = document.getElementById('winnerMessage');
      messageBox.replaceChildren();

      [firstLine, secondLine].forEach(text => {
        const line = document.createElement('span');
        line.className = 'message-line';
        line.textContent = text;
        messageBox.appendChild(line);
      });
    }

    function showWin(color) {
      const winnerIndex = colorPlayerIndex(color);
      const nextBlackIndex = 1 - blackPlayer;
      const colorName = color === 1 ? '흑돌' : '백돌';

      document.getElementById('winnerStone').className = `winner-stone stone ${color === 1 ? 'black' : 'white'}`;
      document.getElementById('winnerTitle').textContent = `${players[winnerIndex].name} 승리!`;
      setWinnerMessage(
        `${colorName}로 5개 이상을 연결했습니다.`,
        `다음 판에는 ${players[nextBlackIndex].name}이(가) 흑돌을 맡아 먼저 둡니다.`
      );
      document.getElementById('resultOverlay').classList.add('show');
    }

    function showDraw() {
      const nextBlackIndex = 1 - blackPlayer;
      document.getElementById('winnerStone').className = 'winner-stone';
      document.getElementById('winnerStone').style.background = '#dfe9eb';
      document.getElementById('winnerTitle').textContent = '무승부!';
      setWinnerMessage(
        '빈칸이 모두 채워졌습니다.',
        `다음 판에는 ${players[nextBlackIndex].name}이(가) 흑돌을 맡아 먼저 둡니다.`
      );
      document.getElementById('resultOverlay').classList.add('show');
    }

    function closeResult() {
      document.getElementById('resultOverlay').classList.remove('show');
      document.getElementById('winnerStone').style.background = '';
    }

    function openSettings() {
      document.getElementById('nameInput0').value = players[0].name;
      document.getElementById('nameInput1').value = players[1].name;
      selectedSize = N;
      selectedFirstBlack = blackPlayer;
      refreshSettingsButtons();
      document.getElementById('cancelSettingsBtn').style.display = hasStarted ? 'block' : 'none';
      document.getElementById('settingsOverlay').classList.add('show');
    }

    function closeSettings() {
      if (!hasStarted) return;
      document.getElementById('settingsOverlay').classList.remove('show');
    }

    function selectSize(size) {
      selectedSize = size;
      refreshSettingsButtons();
    }

    function selectFirstBlack(index) {
      selectedFirstBlack = index;
      refreshSettingsButtons();
    }

    function refreshSettingsButtons() {
      const n0 = document.getElementById('nameInput0').value.trim() || '학생 1';
      const n1 = document.getElementById('nameInput1').value.trim() || '학생 2';

      document.getElementById('size13Btn').classList.toggle('on', selectedSize === 13);
      document.getElementById('size15Btn').classList.toggle('on', selectedSize === 15);
      document.getElementById('blackPlayer0Btn').classList.toggle('on', selectedFirstBlack === 0);
      document.getElementById('blackPlayer1Btn').classList.toggle('on', selectedFirstBlack === 1);
      document.getElementById('blackPlayer0Btn').textContent = n0;
      document.getElementById('blackPlayer1Btn').textContent = n1;
    }

    function applySettings() {
      const name0 = document.getElementById('nameInput0').value.trim() || '학생 1';
      const name1 = document.getElementById('nameInput1').value.trim() || '학생 2';

      players = [
        { name: name0, score: 0 },
        { name: name1, score: 0 }
      ];
      N = selectedSize;
      blackPlayer = selectedFirstBlack;
      document.getElementById('settingsOverlay').classList.remove('show');
      startRound();
    }

    document.getElementById('nameInput0').addEventListener('input', refreshSettingsButtons);
    document.getElementById('nameInput1').addEventListener('input', refreshSettingsButtons);

    /* 화면을 닫거나 다른 앱으로 이동할 때도 한 번 더 저장 */
    window.addEventListener('pagehide', saveGame);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') saveGame();
    });

    /* 저장된 게임이 있으면 이름·승수·진행 중인 판까지 자동 복원 */
    const restored = loadGame();

    if (restored) {
      document.getElementById('settingsOverlay').classList.remove('show');
      drawBoard();
      updateUI();

      if (gameOver) {
        if (winLine && history.length) {
          showWin(history[history.length - 1].p);
        } else {
          showDraw();
        }
      }
    } else {
      board = Array.from({ length: N }, () => Array(N).fill(0));
      drawBoard();
      updateUI();
    }
  </script>
</body>
</html>
